<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nexus Analytics 2.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0b0e14; --panel:#11151f; --panel2:#161b27; --border:#222838;
  --text:#e6e9f0; --muted:#8993a8; --accent:#5b8cff; --accent2:#22d3a5;
  --warn:#ffb454; --danger:#ff6b6b; --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);}
button{font-family:inherit;}

/* ---------- LAYOUT SHELL ---------- */
#shell{display:flex;min-height:100vh;}
#sidebar{
  width:230px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
#sidebar .brand{padding:20px 18px;font-weight:700;font-size:17px;letter-spacing:.3px;border-bottom:1px solid var(--border);}
#sidebar .brand span{color:var(--accent);}
#nav-list{list-style:none;margin:0;padding:10px;flex:1;overflow-y:auto;}
#nav-list li{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);
  cursor:pointer;color:var(--muted);font-size:14px;margin-bottom:2px;transition:.15s;
}
#nav-list li:hover{background:var(--panel2);color:var(--text);}
#nav-list li.active{background:rgba(91,140,255,.12);color:var(--accent);font-weight:600;}
#nav-list li .ic{width:18px;text-align:center;}

#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{
  height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;background:var(--panel);flex-shrink:0;
}
#topbar h1{font-size:16px;margin:0;font-weight:600;}
#menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}

#content-wrap{flex:1;display:flex;overflow:hidden;}
#filters-panel{
  width:260px;background:var(--panel);border-right:1px solid var(--border);
  padding:16px;overflow-y:auto;flex-shrink:0;transition:margin-left .2s;
}
#filters-panel.collapsed{margin-left:-260px;}
#filters-toggle{
  background:var(--panel2);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;
}
#module-view{flex:1;overflow-y:auto;padding:20px;}

.filt-group{margin-bottom:18px;}
.filt-group h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px;}
.filt-row{display:flex;gap:6px;margin-bottom:8px;}
.filt-row input,.filt-row select{
  width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:7px 8px;border-radius:7px;font-size:13px;
}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  background:var(--panel2);border:1px solid var(--border);color:var(--muted);
  padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;user-select:none;
}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.quickbtn{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:6px 8px;border-radius:7px;font-size:12px;cursor:pointer;width:100%;text-align:left;margin-bottom:5px;
}
.quickbtn:hover{border-color:var(--accent);}

/* ---------- KPI / CARDS ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.kpi-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.kpi-card .val{font-size:22px;font-weight:700;margin-top:4px;}
.kpi-card .sub{font-size:11px;color:var(--accent2);margin-top:2px;}

.panel-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:20px;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.panel h2{font-size:13px;margin:0 0 12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
th{position:sticky;top:0;background:var(--panel);color:var(--muted);font-weight:600;cursor:pointer;}
tbody tr:hover{background:var(--panel2);}
#table-search{width:100%;margin-bottom:10px;padding:8px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;color:var(--text);}
.table-tools{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px;color:var(--muted);}
.btn-export{background:var(--accent2);color:#06281f;border:none;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}

#drop-zone{
  border:2px dashed var(--accent);border-radius:var(--radius);padding:28px 20px;text-align:center;
  color:var(--text);cursor:pointer;margin-bottom:20px;background:rgba(91,140,255,.08);
}
#drop-zone:active{background:rgba(91,140,255,.16);}
#drop-zone.drag{border-color:var(--accent);color:var(--accent);}
#progress-wrap{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:12px;display:none;}
#progress-bar{height:100%;width:0%;background:var(--accent);transition:.2s;}

/* ---------- LOGIN ---------- */
#login-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
  justify-content:center;z-index:1000;flex-direction:column;gap:20px;
}
#login-screen.hidden{display:none;}
.login-card{
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;text-align:center;max-width:360px;width:90%;
}
.login-card h1{font-size:26px;font-weight:700;color:var(--text);margin:0 0 4px;}
.login-card h1 span{color:var(--accent);}
.login-card p{color:var(--muted);font-size:13px;margin:0 0 28px;}
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#fff;color:#1a1a1a;border:none;border-radius:8px;
  padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;
}
.btn-google:hover{background:#f0f0f0;}
.btn-google svg{width:20px;height:20px;}
.user-badge{
  display:flex;align-items:center;gap:8px;padding:5px 10px;
  background:var(--panel2);border:1px solid var(--border);border-radius:20px;
  font-size:12px;color:var(--muted);cursor:pointer;
}
.user-badge img{width:22px;height:22px;border-radius:50%;}

/* ---------- CONFIGURAÇÕES ---------- */
.config-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;}
.config-tab{
  padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;
}
.config-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.config-section{display:none;}
.config-section.active{display:block;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.form-group input,.form-group select{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:8px 10px;border-radius:7px;font-size:13px;font-family:inherit;
}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);}
.btn-primary{
  background:var(--accent);color:#fff;border:none;padding:9px 18px;
  border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;
}
.btn-danger-sm{
  background:none;border:1px solid var(--danger);color:var(--danger);
  padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;
}
.btn-edit-sm{
  background:none;border:1px solid var(--accent);color:var(--accent);
  padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;margin-right:4px;
}
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;}
.data-table th{padding:8px 10px;text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.data-table tr:hover td{background:var(--panel2);}
.badge-ativa{color:var(--accent2);font-size:11px;font-weight:600;}
.badge-encerrada{color:var(--danger);font-size:11px;font-weight:600;}
.badge-suspensa{color:var(--warn);font-size:11px;font-weight:600;}
.budget-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.budget-cell{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;}
.budget-cell .mes{font-size:11px;color:var(--muted);margin-bottom:4px;}
.budget-cell input{
  width:100%;background:transparent;border:none;color:var(--text);
  font-size:14px;font-weight:600;padding:0;font-family:inherit;
}
.budget-cell input:focus{outline:none;}
@media(max-width:880px){
  .form-grid{grid-template-columns:1fr;}
  .budget-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:880px){
  #sidebar{position:fixed;inset:0 auto 0 0;z-index:50;transform:translateX(-100%);transition:.2s;}
  #sidebar.open{transform:translateX(0);}
  #menu-toggle{display:block;}
  #filters-panel{position:fixed;inset:56px 0 0 0;z-index:40;width:100%;transform:translateY(-110%);transition:.2s;}
  #filters-panel.mobile-open{transform:translateY(0);}
  #filters-panel.collapsed{margin-left:0;}
  #filters-toggle{display:none;}
  .panel-grid{grid-template-columns:1fr;}
  .kpi-card .val{font-size:19px;}
  #content-wrap{position:relative;}
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;display:none;}
.overlay.show{display:block;}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" style="display:none;">
  <div class="login-card">
    <h1>Nexus <span>Analytics</span></h1>
    <p>Plataforma de análise operacional</p>
    <button class="btn-google" id="btn-google-login">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>
  </div>
</div>

<div id="shell" style="display:none;">
  <nav id="sidebar">
    <div class="brand">Nexus <span>Analytics</span></div>
    <ul id="nav-list"></ul>
  </nav>

  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="menu-toggle">☰</button>
        <h1 id="module-title">Permanência</h1>
      </div>
      <button id="filters-toggle">Filtros ▸</button>
      <div class="user-badge" id="user-badge" onclick="NexusAuth.logout()" title="Clique para sair">
        <span id="user-name">...</span>
      </div>
    </div>

    <div id="content-wrap">
      <aside id="filters-panel"></aside>
      <div id="module-view"></div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay"></div>

<script>
/* ======================================================================
   NEXUS CORE
   ====================================================================== */
const Nexus = {
  modules: {},
  activeModuleId: null,
  rawData: [],       // dados normalizados (Schema Universal) — fonte única de verdade
  filteredData: [],
  _arquivosImportados: [],  // rastreamento de arquivos importados
  filters: {
    dateStart: null, dateEnd: null,
    weekdays: new Set([0,1,2,3,4,5,6]),
    permRange: null
  },

  registerModule(mod){ this.modules[mod.id] = mod; },

  init(){
    this.renderNav();
    this.bindShell();
    this.goTo(Object.keys(this.modules)[0]);
  },

  renderNav(){
    const ul = document.getElementById('nav-list');
    ul.innerHTML = '';
    Object.values(this.modules).forEach(m=>{
      const li = document.createElement('li');
      li.dataset.id = m.id;
      li.innerHTML = `<span class="ic">${m.icon}</span><span>${m.nome}</span>`;
      li.onclick = ()=> { this.goTo(m.id); document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); };
      ul.appendChild(li);
    });
  },

  goTo(id){
    this.activeModuleId = id;
    document.querySelectorAll('#nav-list li').forEach(li=>li.classList.toggle('active', li.dataset.id===id));
    document.getElementById('module-title').textContent = this.modules[id].nome;
    this.applyFilters();
    this.modules[id].renderFilters(document.getElementById('filters-panel'));
    this.modules[id].render(document.getElementById('module-view'));
  },

  applyFilters(){
    const f = this.filters;
    this.filteredData = this.rawData.filter(d=>{
      if(f.dateStart && d.timestampEntrada < f.dateStart) return false;
      if(f.dateEnd && d.timestampEntrada > f.dateEnd) return false;
      if(!f.weekdays.has(d.timestampEntrada.getDay())) return false;
      if(f.permRange){
        const [min,max] = f.permRange;
        if(d.permanenciaMin < min || (max!==null && d.permanenciaMin > max)) return false;
      }
      return true;
    });
  },

  refreshActive(){
    this.applyFilters();
    this.modules[this.activeModuleId].render(document.getElementById('module-view'));
  },

  bindShell(){
    document.getElementById('menu-toggle').onclick = ()=>{
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    };
    document.getElementById('overlay').onclick = ()=>{
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('filters-panel').classList.remove('mobile-open');
      document.getElementById('overlay').classList.remove('show');
    };
    document.getElementById('filters-toggle').onclick = ()=>{
      const isMobile = window.innerWidth <= 880;
      const fp = document.getElementById('filters-panel');
      if(isMobile){
        fp.classList.toggle('mobile-open');
        document.getElementById('overlay').classList.toggle('show');
      } else {
        fp.classList.toggle('collapsed');
      }
    };
  },

  /* ---------------- ENGINE DE IMPORTAÇÃO + NORMALIZAÇÃO ---------------- */
  async importFiles(fileList, onProgress){
    let all = [];
    const files = Array.from(fileList);
    for(let i=0;i<files.length;i++){
      const file = files[i];
      const rows = await this._parseFile(file);
      const normalized = this._normalize(rows).map(d => ({...d, _arquivo: file.name}));
      all = all.concat(normalized);

      // Registra arquivo importado
      if(!this._arquivosImportados) this._arquivosImportados = [];
      const jaExiste = this._arquivosImportados.findIndex(a => a.nome === file.name);
      if(jaExiste >= 0){
        // Remove registros antigos desse arquivo e substitui
        this.rawData = this.rawData.filter(d => d._arquivo !== file.name);
        this._arquivosImportados.splice(jaExiste, 1);
      }

      onProgress(Math.round(((i+1)/files.length)*100));
    }
    this.rawData = this.rawData.concat(all);

    // Registra cada arquivo com contagem e data
    Array.from(fileList).forEach(file => {
      const count = all.filter(d => d._arquivo === file.name).length;
      this._arquivosImportados.push({
        nome: file.name,
        registros: count,
        data: new Date().toLocaleString('pt-BR')
      });
    });

    return all.length;
  },

  _parseFile(file){
    return new Promise((resolve)=>{
      const ext = file.name.split('.').pop().toLowerCase();
      if(ext==='csv'){
        Papa.parse(file, { header:true, skipEmptyLines:true, complete: r=> resolve(r.data) });
      } else if(ext==='xlsx' || ext==='xls'){
        const reader = new FileReader();
        reader.onload = e=>{
          const wb = XLSX.read(e.target.result, {type:'binary'});
          const sheet = wb.Sheets[wb.SheetNames[0]];
          // header:1 → array de arrays — necessário porque o relatório tem metadados antes do cabeçalho real
          resolve(XLSX.utils.sheet_to_json(sheet, {header:1, defval:''}));
        };
        reader.readAsBinaryString(file);
      } else {
        resolve([]); // PDF entra na Fase 5 — fora do escopo deste esqueleto
      }
    });
  },

  // Normalizador mapeado para o relatório "Tickets Pagos e Cancelados"
  // Estrutura confirmada: cabeçalho na linha 10, dados a partir da linha 11.
  // Colunas (índice 0-based após slice de array):
  //   [1]=TICKET [4]=PLACA [5]=DATA+HORA ENTRADA [9]=DATA+HORA SAIDA
  //   [12]=FORMA PAGAMENTO [13]=VALOR [15]=USUARIO PAGAMENTO
  //   [18]=PERMANÊNCIA (formato "Xd HH:MM:SS") [19]=CANCELADO
  _normalize(rows){
    const isArrayRow = Array.isArray(rows[0]);
    // Col M (índice 12) = FORMA PAGAMENTO — base do cálculo
    // Col N (índice 13) = VALOR              — base do cálculo
    // Col L (índice 11) = TERMINAL           — irrelevante, não usar
    const COL = { ticket:1, entrada:5, hora_entrada:7, saida:9, hora_saida:10, formaPag:12, valor:13, perm:18, cancelado:19, tolerancia:20 };
    const dataRows = isArrayRow ? rows.slice(10) : rows;

    const parseDataHora = (dataStr, horaStr) => {
      if(!dataStr) return null;
      const ds = String(dataStr).trim();
      const hs = String(horaStr||'').trim();
      const m = ds.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if(!m) return null;
      const [,d,mo,y] = m;
      const time = hs.match(/\d{2}:\d{2}/) ? hs.substring(0,5) : '00:00';
      return new Date(`${y}-${mo}-${d}T${time}:00`);
    };

    const parsePermMin = str => {
      if(!str) return 0;
      const m = String(str).match(/(\d+)d\s+(\d+):(\d+):(\d+)/);
      if(!m) return 0;
      const [,d,h,min] = m;
      return parseInt(d)*1440 + parseInt(h)*60 + parseInt(min);
    };

    const parseValor = str => {
      if(!str) return 0;
      return parseFloat(String(str).replace(/[R$\s]/g,'').replace(',','.')) || 0;
    };

    return dataRows
      .map((r, i) => {
        const get = col => isArrayRow ? r[col] : Object.values(r)[col];
        const entrada = parseDataHora(get(COL.entrada), get(COL.hora_entrada));
        if(!entrada || isNaN(entrada.getTime())) return null;

        const forma = String(get(COL.formaPag)||'').trim();
        const isCancelado = String(get(COL.cancelado)||'').trim().toUpperCase() === 'CANCELADO'
          || forma.toUpperCase() === 'TICKET CANCELADO';

        return {
          id: 'r'+i+'_'+Date.now(),
          ticket: String(get(COL.ticket)||'').trim(),
          timestampEntrada: entrada,
          timestampSaida: parseDataHora(get(COL.saida), get(COL.hora_saida)),
          permanenciaMin: parsePermMin(get(COL.perm)),
          valorPago: parseValor(get(COL.valor)),
          formaPagamento: isCancelado ? 'Cancelado' : (forma || 'N/D'),
          tolerancia: String(get(COL.tolerancia)||'').trim().toLowerCase() === 'sim',
          status: isCancelado ? 'cancelado' : 'pago'
        };
      })
      .filter(Boolean);
  }
};

/* ======================================================================
   MÓDULO PILOTO: PERMANÊNCIA
   Implementa o contrato: renderFilters(), render()
   Qualquer módulo futuro segue exatamente este mesmo padrão.
   ====================================================================== */
const ModuloPermanencia = {
  id: 'permanencia',
  nome: 'Permanência',
  icon: '📍',
  chartRef: null,
  sortState: {col:'timestampEntrada', dir:-1},
  searchTerm: '',
  permInterval: 60, // 30 ou 60 minutos — intervalo do gráfico de permanência

  // Converte minutos → "HH:MM"
  minToHHMM(min){
    const h = Math.floor(min / 60);
    const m = Math.round(min % 60);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  },

  // Regra universal: col N (valor) vazio ou zerado = desconsiderado em tudo
  _ePago(d){
    if(d.status !== 'pago') return false;
    if(d.valorPago <= 0)    return false;
    if(d.tolerancia)        return false;
    const fp = (d.formaPagamento||'').toLowerCase();
    if(fp === 'n/d' || fp.includes('sem pagamento') || fp.includes('cancelado') || fp.includes('desconto')) return false;
    return true;
  },

  renderFilters(container){
    container.innerHTML = `
      <div class="filt-group">
        <h3>Data inicial / final</h3>
        <div class="filt-row">
          <input type="date" id="f-start">

  _bindFilters(container){
    container.querySelector('#f-start').onchange = e=>{
      Nexus.filters.dateStart = e.target.value ? new Date(e.target.value + 'T00:00:00') : null;

    container.querySelectorAll('#weekday-chips .chip').forEach(chip=>{
      chip.onclick = ()=>{
        const day = parseInt(chip.dataset.day);
        chip.classList.toggle('on');
        if(chip.classList.contains('on')) Nexus.filters.weekdays.add(day);
        else Nexus.filters.weekdays.delete(day);
        Nexus.refreshActive();
      };
    });

    container.querySelectorAll('#interval-chips .chip').forEach(chip=>{
      chip.onclick = ()=>{
        container.querySelectorAll('#interval-chips .chip').forEach(c=>c.classList.remove('on'));
        chip.classList.add('on');
        this.permInterval = parseInt(chip.dataset.interval);
        Nexus.refreshActive();
      };
    });

    container.querySelector('#btn-clear').onclick = ()=>{
      Nexus.filters.dateStart = null;
      Nexus.filters.dateEnd   = null;
      Nexus.filters.weekdays  = new Set([0,1,2,3,4,5,6]);
      this.permInterval = 60;
      this.renderFilters(container);
      Nexus.refreshActive();

  async _handleFiles(files){
    const wrap = document.getElementById('progress-wrap');
    const bar = document.getElementById('progress-bar');
    wrap.style.display = 'block';
    await Nexus.importFiles(files, pct=>{ bar.style.width = pct+'%'; });

  },

  render(container){
    const data = Nexus.filteredData;
    const kpis = this._kpis(data);

    container.innerHTML = `
      <div id="drop-zone">
        <div style="font-size:28px;">📂</div>
        <div style="font-weight:600;margin-top:6px;">Toque para selecionar ou arraste seu relatório aqui</div>
        <div style="font-size:11px;margin-top:4px;color:var(--muted);">XLSX · XLS · CSV — você pode selecionar vários arquivos</div>
        <input type="file" id="file-input" multiple accept=".csv,.xlsx,.xls" style="display:none;">

        <div class="kpi-card"><div class="lbl">Volume</div><div class="val">${kpis.volume}</div><div class="sub">pagamentos reais</div></div>

        <div class="kpi-card"><div class="lbl">Permanência Média — Período</div><div class="val">${kpis.permPeriodo}</div><div class="sub">filtro selecionado</div></div>

        <h2>Distribuição permanência × dia da semana</h2>
        <div id="perm-table-wrap"></div>
      </div>

    `;

    this._renderCharts(data);

    const dropZone = container.querySelector('#drop-zone');
    const fileInput = container.querySelector('#file-input');
    dropZone.onclick = ()=> fileInput.click();
    ['dragover','dragleave','drop'].forEach(evt=>{
      dropZone.addEventListener(evt, e=>{
        e.preventDefault();
        dropZone.classList.toggle('drag', evt==='dragover');
      });
    });
    dropZone.addEventListener('drop', e=> this._handleFiles(e.dataTransfer.files));
    fileInput.onchange = e=> this._handleFiles(e.target.files);
  },

  _kpis(data){
    const pagos = data.filter(d => this._ePago(d));
    // permanência média do PERÍODO FILTRADO
    const permPeriodo = pagos.length
      ? pagos.reduce((s,d) => s + d.permanenciaMin, 0) / pagos.length : 0;
    // permanência média do MÊS COMPLETO (todos os dados carregados, sem filtro de data)
    const todosOsMeses = Nexus.rawData.filter(d => this._ePago(d));
    const permMes = todosOsMeses.length
      ? todosOsMeses.reduce((s,d) => s + d.permanenciaMin, 0) / todosOsMeses.length : 0;
    return {
      volume: pagos.length.toLocaleString('pt-BR'),
      permMes: this.minToHHMM(Math.round(permMes)),
      permPeriodo: this.minToHHMM(Math.round(permPeriodo))
    };
  },

  _renderCharts(data){
    const pagos = data.filter(d => this._ePago(d));
    const step = this.permInterval;
    const maxMin = 24 * 60; // até 24 horas

    // Buckets começam em step (não em 0) para evitar linha 00:00
    const buckets = [];
    for(let m = step; m <= maxMin; m += step){
      const label = m === maxMin
        ? `Até 24h`
        : this.minToHHMM(m);
      buckets.push({ label, min: m - step, max: m });
    }

    const days = [
      {label:'Domingo', idx:0},
      {label:'Segunda', idx:1},
      {label:'Terça',   idx:2},
      {label:'Quarta',  idx:3},
      {label:'Quinta',  idx:4},
      {label:'Sexta',   idx:5},
      {label:'Sábado',  idx:6}
    ];

    // Monta matrix com totais
    const matrix = buckets.map(b => {
      const counts = {};
      days.forEach(d => {
        counts[d.idx] = pagos.filter(p =>
          p.permanenciaMin >= b.min &&
          p.permanenciaMin <  b.max &&
          p.timestampEntrada.getDay() === d.idx
        ).length;
      });
      counts.total = days.reduce((s,d) => s + counts[d.idx], 0);
      return { label: b.label, counts };
    }).filter(r => r.counts.total > 0);

    const grandTotal = matrix.reduce((s,r) => s + r.counts.total, 0);

    // Acha os 2 maiores totais para destaque
    const sortedTotals = matrix.map(r => r.counts.total).sort((a,b) => b - a);
    const top1 = sortedTotals[0] || 0;
    const top2 = sortedTotals[1] || 0;

    const colTotals = {};
    days.forEach(d => { colTotals[d.idx] = matrix.reduce((s,r) => s + r.counts[d.idx], 0); });
    colTotals.total = grandTotal;

    const v = n => n === 0
      ? `<span style="color:var(--border)">-</span>`
      : `<span>${n}</span>`;

    const rowStyle = (total) => {
      if(total === top1)  return `background:rgba(91,140,255,.18);`;
      if(total === top2)  return `background:rgba(91,140,255,.09);`;
      return ``;
    };

    const tableHTML = `
      <div style="overflow:auto;max-height:380px;">
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <thead>
            <tr>
              <th style="position:sticky;top:0;left:0;z-index:2;background:var(--panel2);padding:7px 10px;text-align:left;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;">Permanência</th>
              ${days.map(d=>`<th style="position:sticky;top:0;background:var(--panel2);padding:7px 8px;text-align:center;color:var(--muted);border-bottom:2px solid var(--border);">${d.label}</th>`).join('')}
              <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:center;color:var(--accent);border-bottom:2px solid var(--border);">Total</th>
              <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:center;color:var(--accent2);border-bottom:2px solid var(--border);white-space:nowrap;">Participação %</th>
            </tr>
          </thead>
          <tbody>
            ${matrix.map((r,i)=>{
              const pct = grandTotal ? ((r.counts.total / grandTotal) * 100).toFixed(2) : '0.00';
              const isTop = r.counts.total === top1 || r.counts.total === top2;
              const baseStyle = i%2===0 ? 'background:var(--panel);' : 'background:var(--panel2);';
              const highlightStyle = rowStyle(r.counts.total);
              return `
              <tr style="${highlightStyle || baseStyle}">
                <td style="padding:5px 10px;color:var(--accent2);font-weight:600;white-space:nowrap;">${r.label}</td>
                ${days.map(d=>`<td style="padding:5px 8px;text-align:center;">${v(r.counts[d.idx])}</td>`).join('')}
                <td style="padding:5px 10px;text-align:center;font-weight:700;color:var(--text);">${r.counts.total}</td>
                <td style="padding:5px 10px;text-align:center;font-weight:${isTop?'700':'400'};color:${isTop?'var(--warn)':'var(--muted)'};">${pct}%</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--border);">
              <td style="padding:7px 10px;font-weight:700;color:var(--text);">Total</td>
              ${days.map(d=>`<td style="padding:7px 8px;text-align:center;font-weight:700;color:var(--text);">${colTotals[d.idx]||'<span style="color:var(--border)">-</span>'}</td>`).join('')}
              <td style="padding:7px 10px;text-align:center;font-weight:700;color:var(--accent);">${colTotals.total.toLocaleString('pt-BR')}</td>
              <td style="padding:7px 10px;text-align:center;font-weight:700;color:var(--accent2);">100%</td>
            </tr>
          </tfoot>
        </table>
      </div>`;

    document.getElementById('perm-table-wrap').innerHTML = tableHTML;

    if(this.chartRef){ this.chartRef = {}; }
  },
};

        const w = Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);
        return `${dt.getFullYear()}-W${String(w).padStart(2,'0')}` === wk;
      }).forEach(d=>{ vals[d.timestampEntrada.getDay()] += d.valorPago; });
      const total = days.reduce((s,d)=>s+vals[d.idx],0);
      return {label:wk, vals, total};
    }).filter(r=>r.total>0);

    const colTotals = {};
    days.forEach(d=>{ colTotals[d.idx]=matrix.reduce((s,r)=>s+r.vals[d.idx],0); });

    const sortedTotals = matrix.map(r=>r.total).sort((a,b)=>b-a);
    const top1=sortedTotals[0]||0, top2=sortedTotals[1]||0;

    const fmtR = v => v===0 ? '<span style="color:var(--border)">-</span>'
      : 'R$'+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById('receita-semana-wrap').innerHTML = `
      <div style="overflow:auto;max-height:340px;">
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <thead><tr>
            <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:left;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;">Semana</th>
            ${days.map(d=>`<th style="position:sticky;top:0;background:var(--panel2);padding:7px 8px;text-align:right;color:var(--muted);border-bottom:2px solid var(--border);">${d.label}</th>`).join('')}
            <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:right;color:var(--accent);border-bottom:2px solid var(--border);">Total</th>
            <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:center;color:var(--accent2);border-bottom:2px solid var(--border);white-space:nowrap;">Part. %</th>
          </tr></thead>
          <tbody>
            ${matrix.map((r,i)=>{
              const pct = grandTotal ? ((r.total/grandTotal)*100).toFixed(2) : '0.00';
              const isTop = r.total===top1||r.total===top2;
              const bg = isTop
                ? (r.total===top1?'background:rgba(91,140,255,.18);':'background:rgba(91,140,255,.09);')
                : (i%2===0?'background:var(--panel);':'background:var(--panel2);');
              return `<tr style="${bg}">
                <td style="padding:5px 10px;color:var(--accent2);font-weight:600;white-space:nowrap;">${r.label}</td>
                ${days.map(d=>`<td style="padding:5px 8px;text-align:right;">${fmtR(r.vals[d.idx])}</td>`).join('')}
                <td style="padding:5px 10px;text-align:right;font-weight:700;color:var(--text);">${fmtR(r.total)}</td>
                <td style="padding:5px 10px;text-align:center;font-weight:${isTop?'700':'400'};color:${isTop?'var(--warn)':'var(--muted)'};">${pct}%</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot><tr style="border-top:2px solid var(--border);">
            <td style="padding:7px 10px;font-weight:700;">Total</td>
            ${days.map(d=>`<td style="padding:7px 8px;text-align:right;font-weight:700;color:var(--text);">${fmtR(colTotals[d.idx])}</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:var(--accent);">${fmtR(grandTotal)}</td>
            <td style="padding:7px 10px;text-align:center;font-weight:700;color:var(--accent2);">100%</td>
          </tr></tfoot>
        </table>
      </div>`;
  },

};

const ModuloPagamentos = {
  id: 'pagamentos',
  nome: 'Pagamentos',
  icon: '💳',
  chartRef: null,

  _ePago(d){
    if(d.status !== 'pago') return false;
    if(d.valorPago <= 0)    return false;
    if(d.tolerancia)        return false;
    const fp = (d.formaPagamento||'').toLowerCase();
    if(fp === 'n/d' || fp.includes('sem pagamento') || fp.includes('cancelado') || fp.includes('desconto')) return false;
    return true;
  },

  renderFilters(container){
    container.innerHTML = `
      <div class="filt-group">
        <h3>Data inicial / final</h3>
        <div class="filt-row">
          <input type="date" id="f-start">
          <input type="date" id="f-end">
        </div>
      </div>
      <div class="filt-group">
        <h3>Dias da semana</h3>
        <div class="chip-row" id="weekday-chips">
          ${['D','S','T','Q','Q','S','S'].map((d,i)=>`<div class="chip on" data-day="${[0,1,2,3,4,5,6][i]}">${d}</div>`).join('')}
        </div>
      </div>
      <button class="quickbtn" id="btn-clear" style="margin-top:8px;color:var(--danger);border-color:var(--danger);">✕ Limpar filtros</button>
    `;
    this._bindFilters(container);
  },

  _bindFilters(container){
    container.querySelector('#f-start').onchange = e=>{
      Nexus.filters.dateStart = e.target.value ? new Date(e.target.value + 'T00:00:00') : null;
      Nexus.refreshActive();
    };
    container.querySelector('#f-end').onchange = e=>{
      Nexus.filters.dateEnd = e.target.value ? new Date(e.target.value + 'T23:59:59') : null;
      Nexus.refreshActive();
    };
    container.querySelectorAll('#weekday-chips .chip').forEach(chip=>{
      chip.onclick = ()=>{
        const day = parseInt(chip.dataset.day);
        chip.classList.toggle('on');
        if(chip.classList.contains('on')) Nexus.filters.weekdays.add(day);
        else Nexus.filters.weekdays.delete(day);
        Nexus.refreshActive();
      };
    });
    container.querySelector('#btn-clear').onclick = ()=>{
      Nexus.filters.dateStart = null;
      Nexus.filters.dateEnd   = null;
      Nexus.filters.weekdays  = new Set([0,1,2,3,4,5,6]);
      this.renderFilters(container);
      Nexus.refreshActive();
    };
  },

  render(container){
    const data = Nexus.filteredData.filter(d => this._ePago(d));

    // --- Agrupa por forma de pagamento ---
    const formas = {};
    data.forEach(d=>{
      if(!formas[d.formaPagamento]) formas[d.formaPagamento] = { receita:0, volume:0 };
      formas[d.formaPagamento].receita += d.valorPago;
      formas[d.formaPagamento].volume  += 1;
    });
    const totalReceita = Object.values(formas).reduce((s,f)=>s+f.receita, 0);
    const formasSort = Object.entries(formas).sort((a,b)=>b[1].receita-a[1].receita);

    const fmtR = v => 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
    const COLORS = ['#5b8cff','#22d3a5','#ffb454','#ff6b6b','#a78bfa','#38bdf8','#fb923c','#4ade80','#f472b6','#34d399'];

    container.innerHTML = `
      <div id="drop-zone">
        <div style="font-size:28px;">📂</div>
        <div style="font-weight:600;margin-top:6px;">Toque para selecionar ou arraste seu relatório aqui</div>
        <div style="font-size:11px;margin-top:4px;color:var(--muted);">XLSX · XLS · CSV — você pode selecionar vários arquivos</div>
        <input type="file" id="file-input" multiple accept=".csv,.xlsx,.xls" style="display:none;">
        <div id="progress-wrap"><div id="progress-bar"></div></div>
      </div>

      <!-- Cards por forma de pagamento -->
      <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
        ${formasSort.map(([forma, f], i)=>{
          const pct = totalReceita ? ((f.receita/totalReceita)*100).toFixed(1) : '0.0';
          const cor = COLORS[i % COLORS.length];
          return `
          <div class="kpi-card" style="border-left:3px solid ${cor};">
            <div class="lbl" style="color:${cor};">${forma}</div>
            <div class="val" style="font-size:18px;">${fmtR(f.receita)}</div>
            <div style="display:flex;justify-content:space-between;margin-top:4px;">
              <span style="font-size:11px;color:var(--muted);">${f.volume.toLocaleString('pt-BR')} transações</span>
              <span style="font-size:11px;font-weight:700;color:var(--accent2);">${pct}%</span>
            </div>
          </div>`;
        }).join('') || '<div class="kpi-card"><div class="lbl">Aguardando dados</div></div>'}
      </div>

      <!-- Tabela cruzada: Receita × Forma × Semana -->
      <div class="panel" style="overflow:hidden;">
        <h2>Receita (R$) × Forma de pagamento × Semana</h2>
        <div id="pag-semana-wrap"></div>
      </div>
    `;

    this._renderCharts(data, formasSort, totalReceita, COLORS);

    const dropZone = container.querySelector('#drop-zone');
    const fileInput = container.querySelector('#file-input');
    dropZone.onclick = ()=> fileInput.click();
    ['dragover','dragleave','drop'].forEach(evt=>{
      dropZone.addEventListener(evt, e=>{ e.preventDefault(); dropZone.classList.toggle('drag', evt==='dragover'); });
    });
    dropZone.addEventListener('drop', e=> this._handleFiles(e.dataTransfer.files));
    fileInput.onchange = e=> this._handleFiles(e.target.files);
  },

  async _handleFiles(files){
    const wrap = document.getElementById('progress-wrap');
    const bar  = document.getElementById('progress-bar');
    wrap.style.display = 'block';
    await Nexus.importFiles(files, pct=>{ bar.style.width = pct+'%'; });
    setTimeout(()=>{ wrap.style.display='none'; bar.style.width='0%'; }, 600);
    Nexus.refreshActive();
  },

  _renderCharts(data, formasSort, totalReceita, COLORS){
    if(this.chartRef){ this.chartRef = {}; }

    // ---- Tabela cruzada: Receita × Forma × Semana ----
    const semanas = [...new Set(data.map(d=>{
      const dt=d.timestampEntrada, jan1=new Date(dt.getFullYear(),0,1);
      const wk=Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);
      return `${dt.getFullYear()}-W${String(wk).padStart(2,'0')}`;
    }))].sort();

    const fmt = v => v===0
      ? '<span style="color:var(--border)">-</span>'
      : 'R$&nbsp;'+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

    // matrix: linha = semana, coluna = forma
    const allFormas = formasSort.map(([f])=>f);
    const matrix = semanas.map(wk=>{
      const vals={};
      allFormas.forEach(f=>{ vals[f]=0; });
      data.filter(d=>{
        const dt=d.timestampEntrada, jan1=new Date(dt.getFullYear(),0,1);
        const w=Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);
        return `${dt.getFullYear()}-W${String(w).padStart(2,'0')}`===wk;
      }).forEach(d=>{ vals[d.formaPagamento]=(vals[d.formaPagamento]||0)+d.valorPago; });
      const total=allFormas.reduce((s,f)=>s+(vals[f]||0),0);
      return {label:wk, vals, total};
    }).filter(r=>r.total>0);

    const grandTotal = matrix.reduce((s,r)=>s+r.total,0);
    const colTotals={};
    allFormas.forEach(f=>{ colTotals[f]=matrix.reduce((s,r)=>s+(r.vals[f]||0),0); });
    const sortedT=matrix.map(r=>r.total).sort((a,b)=>b-a);
    const top1=sortedT[0]||0, top2=sortedT[1]||0;

    document.getElementById('pag-semana-wrap').innerHTML = `
      <div style="overflow:auto;max-height:380px;">
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <thead><tr>
            <th style="position:sticky;top:0;left:0;z-index:2;background:var(--panel2);padding:7px 10px;text-align:left;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;">Semana</th>
            ${allFormas.map(f=>`<th style="position:sticky;top:0;background:var(--panel2);padding:7px 8px;text-align:right;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;">${f}</th>`).join('')}
            <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:right;color:var(--accent);border-bottom:2px solid var(--border);">Total</th>
            <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:center;color:var(--accent2);border-bottom:2px solid var(--border);">Part.%</th>
          </tr></thead>
          <tbody>
            ${matrix.map((r,i)=>{
              const pct=grandTotal?((r.total/grandTotal)*100).toFixed(2):'0.00';
              const isTop=r.total===top1||r.total===top2;
              const bg=r.total===top1?'background:rgba(91,140,255,.18);':r.total===top2?'background:rgba(91,140,255,.09);':i%2===0?'background:var(--panel);':'background:var(--panel2);';
              return `<tr style="${bg}">
                <td style="padding:5px 10px;color:var(--accent2);font-weight:600;white-space:nowrap;">${r.label}</td>
                ${allFormas.map(f=>`<td style="padding:5px 8px;text-align:right;">${fmt(r.vals[f]||0)}</td>`).join('')}
                <td style="padding:5px 10px;text-align:right;font-weight:700;color:var(--text);">${fmt(r.total)}</td>
                <td style="padding:5px 10px;text-align:center;font-weight:${isTop?'700':'400'};color:${isTop?'var(--warn)':'var(--muted)'};">${pct}%</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot><tr style="border-top:2px solid var(--border);">
            <td style="padding:7px 10px;font-weight:700;color:var(--text);">Total</td>
            ${allFormas.map(f=>`<td style="padding:7px 8px;text-align:right;font-weight:700;color:var(--text);">${fmt(colTotals[f]||0)}</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:var(--accent);">${fmt(grandTotal)}</td>
            <td style="padding:7px 10px;text-align:center;font-weight:700;color:var(--accent2);">100%</td>
          </tr></tfoot>
        </table>
      </div>`;
  }
};

        Nexus._arquivosImportados = [];

      };
    }
  }
};

/* ======================================================================
   NEXUS AUTH — Login Google + sessão
   ====================================================================== */
const NexusAuth = {
  user: null,

  async init(){
    document.getElementById('btn-google-login').onclick = ()=> this.login();

    // onAuthStateChange é o método mais confiável — dispara automaticamente
    // quando o Supabase processa o token OAuth na URL (hash ou query string)
    supa.auth.onAuthStateChange((event, session)=>{
      if(event === 'SIGNED_OUT'){
        this.user = null;
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('shell').style.display = 'none';
        return;
      }
      if(session && !this.user){
        this.user = session.user;
        this._onLogin();
      }
    });

    // Aguarda o Supabase processar o hash da URL (após redirect OAuth)
    // getSession() já faz isso internamente no SDK v2
    const { data: { session } } = await supa.auth.getSession();
    if(session){
      this.user = session.user;
      this._onLogin();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
    }
  },

  async login(){
    await supa.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.href,
        queryParams: { prompt: 'select_account' }
      }
    });
  },

  async logout(){
    if(!confirm('Deseja sair do Nexus Analytics?')) return;
    await supa.auth.signOut();
  },

  _onLogin(){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('shell').style.display = '';
    const nome = this.user?.user_metadata?.full_name || this.user?.email || '';
    document.getElementById('user-name').textContent = nome.split(' ')[0];
    Nexus.init();
  },

  // Registra qualquer alteração no log
  async log(tabela, operacao, registro_id, dados_antes, dados_depois){
    await supa.from('na_log_alteracoes').insert({
      tabela, operacao, registro_id, dados_antes, dados_depois,
      usuario_email: this.user?.email
    });
  }
};
