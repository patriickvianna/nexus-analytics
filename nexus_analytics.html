<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nexus Analytics 2.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --bg:#0b0e14; --panel:#11151f; --panel2:#161b27; --border:#222838;
  --text:#e6e9f0; --muted:#8993a8; --accent:#5b8cff; --accent2:#22d3a5;
  --warn:#ffb454; --danger:#ff6b6b; --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);}
button{font-family:inherit;}

/* ---------- LAYOUT SHELL ---------- */
#shell{display:flex;min-height:100vh;}
#sidebar{
  width:230px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
}
#sidebar .brand{padding:20px 18px;font-weight:700;font-size:17px;letter-spacing:.3px;border-bottom:1px solid var(--border);}
#sidebar .brand span{color:var(--accent);}
#nav-list{list-style:none;margin:0;padding:10px;flex:1;overflow-y:auto;}
#nav-list li{
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);
  cursor:pointer;color:var(--muted);font-size:14px;margin-bottom:2px;transition:.15s;
}
#nav-list li:hover{background:var(--panel2);color:var(--text);}
#nav-list li.active{background:rgba(91,140,255,.12);color:var(--accent);font-weight:600;}
#nav-list li .ic{width:18px;text-align:center;}

#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{
  height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;background:var(--panel);flex-shrink:0;
}
#topbar h1{font-size:16px;margin:0;font-weight:600;}
#menu-toggle{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}

#content-wrap{flex:1;display:flex;overflow:hidden;}
#filters-panel{
  width:260px;background:var(--panel);border-right:1px solid var(--border);
  padding:16px;overflow-y:auto;flex-shrink:0;transition:margin-left .2s;
}
#filters-panel.collapsed{margin-left:-260px;}
#filters-toggle{
  background:var(--panel2);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;
}
#module-view{flex:1;overflow-y:auto;padding:20px;}

.filt-group{margin-bottom:18px;}
.filt-group h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px;}
.filt-row{display:flex;gap:6px;margin-bottom:8px;}
.filt-row input,.filt-row select{
  width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:7px 8px;border-radius:7px;font-size:13px;
}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  background:var(--panel2);border:1px solid var(--border);color:var(--muted);
  padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;user-select:none;
}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.quickbtn{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:6px 8px;border-radius:7px;font-size:12px;cursor:pointer;width:100%;text-align:left;margin-bottom:5px;
}
.quickbtn:hover{border-color:var(--accent);}

/* ---------- KPI / CARDS ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.kpi-card .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.kpi-card .val{font-size:22px;font-weight:700;margin-top:4px;}
.kpi-card .sub{font-size:11px;color:var(--accent2);margin-top:2px;}

.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.panel h2{font-size:13px;margin:0 0 12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
th{position:sticky;top:0;background:var(--panel);color:var(--muted);font-weight:600;cursor:pointer;}
tbody tr:hover{background:var(--panel2);}

#drop-zone{
  border:2px dashed var(--accent);border-radius:var(--radius);padding:28px 20px;text-align:center;
  color:var(--text);cursor:pointer;margin-bottom:20px;background:rgba(91,140,255,.08);
}
#drop-zone:active{background:rgba(91,140,255,.16);}
#drop-zone.drag{border-color:var(--accent);color:var(--accent);}
#progress-wrap{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:12px;display:none;}
#progress-bar{height:100%;width:0%;background:var(--accent);transition:.2s;}

/* ---------- LOGIN ---------- */
#login-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;
  justify-content:center;z-index:1000;flex-direction:column;gap:20px;
}
#login-screen.hidden{display:none;}
.login-card{
  background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:40px 36px;text-align:center;max-width:360px;width:90%;
}
.login-card h1{font-size:26px;font-weight:700;color:var(--text);margin:0 0 4px;}
.login-card h1 span{color:var(--accent);}
.login-card p{color:var(--muted);font-size:13px;margin:0 0 28px;}
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#fff;color:#1a1a1a;border:none;border-radius:8px;
  padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;width:100%;
}
.btn-google:hover{background:#f0f0f0;}
.btn-google svg{width:20px;height:20px;}
.user-badge{
  display:flex;align-items:center;gap:8px;padding:5px 10px;
  background:var(--panel2);border:1px solid var(--border);border-radius:20px;
  font-size:12px;color:var(--muted);cursor:pointer;
}
.user-badge img{width:22px;height:22px;border-radius:50%;}

/* ---------- CONFIGURAÇÕES ---------- */
.config-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;}
.config-tab{
  padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;
}
.config-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.form-group input,.form-group select{
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:8px 10px;border-radius:7px;font-size:13px;font-family:inherit;
}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);}
.btn-primary{
  background:var(--accent);color:#fff;border:none;padding:9px 18px;
  border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;
}
.btn-danger-sm{
  background:none;border:1px solid var(--danger);color:var(--danger);
  padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;
}
.btn-edit-sm{
  background:none;border:1px solid var(--accent);color:var(--accent);
  padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;margin-right:4px;
}
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;}
.data-table th{padding:8px 10px;text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.data-table tr:hover td{background:var(--panel2);}
.badge-ativa{color:var(--accent2);font-size:11px;font-weight:600;}
.badge-encerrada{color:var(--danger);font-size:11px;font-weight:600;}
.badge-suspensa{color:var(--warn);font-size:11px;font-weight:600;}
@media(max-width:880px){
  .form-grid{grid-template-columns:1fr;}
}
@media (max-width:880px){
  #sidebar{position:fixed;inset:0 auto 0 0;z-index:50;transform:translateX(-100%);transition:.2s;}
  #sidebar.open{transform:translateX(0);}
  #menu-toggle{display:block;}
  #filters-panel{position:fixed;inset:56px 0 0 0;z-index:40;width:100%;transform:translateY(-110%);transition:.2s;}
  #filters-panel.mobile-open{transform:translateY(0);}
  #filters-panel.collapsed{margin-left:0;}
  #filters-toggle{display:none;}
  .kpi-card .val{font-size:19px;}
  #content-wrap{position:relative;}
}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;display:none;}
.overlay.show{display:block;}
</style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" style="display:none;">
  <div class="login-card">
    <h1>Nexus <span>Analytics</span></h1>
    <p>Plataforma de análise operacional</p>
    <button class="btn-google" id="btn-google-login">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar com Google
    </button>
  </div>
</div>

<!-- TELA AGUARDANDO APROVAÇÃO -->
<div id="pending-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;align-items:center;justify-content:center;flex-direction:column;">
  <div class="login-card">
    <h1>Nexus <span>Analytics</span></h1>
    <div style="font-size:40px;margin:16px 0;">⏳</div>
    <p id="pending-msg" style="font-size:14px;color:var(--muted);">Aguardando aprovação do administrador...</p>
    <button onclick="NexusAuth.logout()" style="margin-top:16px;background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;">Sair</button>
  </div>
</div>

<div id="shell" style="display:none;">
  <nav id="sidebar">
    <div class="brand">Nexus <span>Analytics</span></div>
    <ul id="nav-list"></ul>
  </nav>

  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="menu-toggle">☰</button>
        <h1 id="module-title">Permanência</h1>
      </div>
      <button id="filters-toggle">Filtros ▸</button>
      <div class="user-badge" id="user-badge" onclick="NexusAuth.logout()" title="Clique para sair">
        <span id="user-name">...</span>
      </div>
    </div>

    <div id="content-wrap">
      <aside id="filters-panel"></aside>
      <div id="module-view"></div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay"></div>

<script>
/* ======================================================================
   NEXUS CORE
   ====================================================================== */
const Nexus = {
  modules: {},
  activeModuleId: null,
  rawData: [],       // dados normalizados (Schema Universal) — fonte única de verdade
  filteredData: [],
  _filialAtual: null,
  filters: {
    dateStart: null, dateEnd: null,
    weekdays: new Set([0,1,2,3,4,5,6])
  },

  registerModule(mod){ this.modules[mod.id] = mod; },

  async initAsync(){
    await NexusDB.open();
    this.renderNav();
    this.bindShell();

    // Hidratação automática: restaura relatório salvo no IndexedDB (F5 / iOS background)
    const saved = await NexusDB.load();
    if(saved && Array.isArray(saved.data) && saved.data.length > 0){
      Nexus.rawData      = saved.data;
      Nexus._filialAtual = saved.filial || null;
      Nexus.applyFilters();

      // Banner discreto de restauração (desaparece em 4s)
      const banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;z-index:9999;box-shadow:0 2px 10px rgba(0,0,0,.4)';
      banner.textContent = '📂 Relatório restaurado automaticamente';
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 4000);
    }

    this.goTo(Object.keys(this.modules)[0]);
  },

  renderNav(){
    const ul = document.getElementById('nav-list');
    ul.innerHTML = '';
    Object.values(this.modules).forEach(m=>{
      const li = document.createElement('li');
      li.dataset.id = m.id;
      li.innerHTML = `<span class="ic">${m.icon}</span><span>${m.nome}</span>`;
      li.onclick = ()=> { this.goTo(m.id); document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); };
      ul.appendChild(li);
    });
  },

  goTo(id){
    this.activeModuleId = id;
    document.querySelectorAll('#nav-list li').forEach(li=>li.classList.toggle('active', li.dataset.id===id));
    document.getElementById('module-title').textContent = this.modules[id].nome;
    this.applyFilters();
    this.modules[id].renderFilters(document.getElementById('filters-panel'));
    this.modules[id].render(document.getElementById('module-view'));
  },

  applyFilters(){
    const f = this.filters;
    this.filteredData = this.rawData.filter(d=>{
      if(f.dateStart && d.timestampPagamento < f.dateStart) return false;
      if(f.dateEnd && d.timestampPagamento > f.dateEnd) return false;
      if(!f.weekdays.has(d.diaPagamento)) return false;
      return true;
    });
  },

  refreshActive(){
    this.applyFilters();
    this.modules[this.activeModuleId].render(document.getElementById('module-view'));
  },

  bindShell(){
    document.getElementById('menu-toggle').onclick = ()=>{
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    };
    document.getElementById('overlay').onclick = ()=>{
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('filters-panel').classList.remove('mobile-open');
      document.getElementById('overlay').classList.remove('show');
    };
    document.getElementById('filters-toggle').onclick = ()=>{
      const isMobile = window.innerWidth <= 880;
      const fp = document.getElementById('filters-panel');
      if(isMobile){
        fp.classList.toggle('mobile-open');
        document.getElementById('overlay').classList.toggle('show');
      } else {
        fp.classList.toggle('collapsed');
      }
    };
  },

  /* ---------------- ENGINE DE IMPORTAÇÃO + NORMALIZAÇÃO ---------------- */
  async importFiles(fileList, onProgress){
    let all = [];
    const files = Array.from(fileList);
    for(let i=0;i<files.length;i++){
      const file = files[i];
      const rows = await this._parseFile(file);
      all = all.concat(this._normalize(rows));
      onProgress(Math.round(((i+1)/files.length)*100));
    }
    this.rawData = this.rawData.concat(all);
    return all.length;
  },

  _parseFile(file){
    return new Promise((resolve)=>{
      const ext = file.name.split('.').pop().toLowerCase();
      if(ext==='csv'){
        // header:false → array de arrays (igual ao XLSX), para _normalize() pular
        // as ~10 linhas de metadados do relatório e usar índices de coluna fixos
        Papa.parse(file, {
          header: false,
          skipEmptyLines: true,
          complete: r => resolve(r.data)
        });
      } else if(ext==='xlsx' || ext==='xls'){
        const reader = new FileReader();
        reader.onload = e=>{
          const wb = XLSX.read(e.target.result, {type:'binary'});
          const sheet = wb.Sheets[wb.SheetNames[0]];
          // header:1 → array de arrays — necessário porque o relatório tem metadados antes do cabeçalho real
          resolve(XLSX.utils.sheet_to_json(sheet, {header:1, defval:''}));
        };
        reader.readAsBinaryString(file);
      } else {
        resolve([]); // PDF entra na Fase 5 — fora do escopo deste esqueleto
      }
    });
  },

  // Normalizador mapeado para o relatório "Tickets Pagos e Cancelados"
  // Estrutura confirmada: cabeçalho na linha 10, dados a partir da linha 11.
  // Colunas (índice 0-based após slice de array):
  //   [1]=TICKET [4]=PLACA [5]=DATA+HORA ENTRADA [9]=DATA+HORA SAIDA
  //   [12]=FORMA PAGAMENTO [13]=VALOR [15]=USUARIO PAGAMENTO
  //   [16]=DATA PAGTO [17]=HORA PAGTO — usada como referência de dia/semana
  //   [18]=PERMANÊNCIA (formato "Xd HH:MM:SS", calculada por entrada x saída — não mexer) [19]=CANCELADO
  _normalize(rows){
    const isArrayRow = Array.isArray(rows[0]);
    // Col M (índice 12) = FORMA PAGAMENTO — base do cálculo
    // Col N (índice 13) = VALOR              — base do cálculo
    // Col L (índice 11) = TERMINAL           — irrelevante, não usar
    const COL = { ticket:1, entrada:5, hora_entrada:7, saida:9, hora_saida:10, formaPag:12, valor:13, dataPagto:16, horaPagto:17, perm:18, cancelado:19, tolerancia:20 };
    const dataRows = isArrayRow ? rows.slice(10) : rows;

    const parseDataHora = (dataStr, horaStr) => {
      if(!dataStr) return null;
      const ds = String(dataStr).trim();
      const hs = String(horaStr||'').trim();
      const m = ds.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if(!m) return null;
      const [,d,mo,y] = m;
      const time = hs.match(/\d{2}:\d{2}/) ? hs.substring(0,5) : '00:00';
      // Força fuso BRT (UTC-3) — evita que dispositivos em outro fuso (ex: iOS em viagem)
      // desloquem transações noturnas para o dia errado
      return new Date(`${y}-${mo}-${d}T${time}:00-03:00`);
    };

    // Helpers de data sempre em BRT, independente do fuso do dispositivo
    const diaSemana = ts => new Date(ts.toLocaleString('en-US', {timeZone:'America/Sao_Paulo'})).getDay();
    const dataStr   = ts => ts.toLocaleDateString('pt-BR', {timeZone:'America/Sao_Paulo'});
    // jan1 forçado em BRT — elimina brecha onde new Date(year,0,1) usa fuso local do aparelho
    const semanaStr = ts => {
      const jan1 = new Date(`${ts.getFullYear()}-01-01T00:00:00-03:00`);
      const wk   = Math.ceil(((ts - jan1) / 86400000 + jan1.getDay() + 1) / 7);
      return `${ts.getFullYear()}-W${String(wk).padStart(2,'0')}`;
    };

    const parsePermMin = str => {
      if(!str) return 0;
      const m = String(str).match(/(\d+)d\s+(\d+):(\d+):(\d+)/);
      if(!m) return 0;
      const [,d,h,min] = m;
      return parseInt(d)*1440 + parseInt(h)*60 + parseInt(min);
    };

    const parseValor = str => {
      if(!str) return 0;
      return parseFloat(String(str).replace(/[R$\s]/g,'').replace(',','.')) || 0;
    };

    return dataRows
      .map((r, i) => {
        const get = col => isArrayRow ? r[col] : Object.values(r)[col];
        const entrada = parseDataHora(get(COL.entrada), get(COL.hora_entrada));
        if(!entrada || isNaN(entrada.getTime())) return null;

        const forma = String(get(COL.formaPag)||'').trim();
        const isCancelado = String(get(COL.cancelado)||'').trim().toUpperCase() === 'CANCELADO'
          || forma.toUpperCase() === 'TICKET CANCELADO';

        // timestampPagamento: usado como referência de dia/semana em TODOS os módulos
        // (filtros, dia da semana, agrupamento semanal, melhor dia). NÃO é usado para
        // recalcular permanência — isso continua vindo direto da coluna PERMANÊNCIA.
        // Sem DATA PAGTO válida (raro; 0 casos no relatório-modelo), o registro é
        // descartado em vez de "chutar" a data de entrada como referência de pagamento.
        const pagamento = parseDataHora(get(COL.dataPagto), get(COL.horaPagto));
        if(!pagamento || isNaN(pagamento.getTime())) return null;

        const valorPago     = parseValor(get(COL.valor));
        const formaPagamento = isCancelado ? 'Cancelado' : (forma || 'N/D');
        const tolerancia    = String(get(COL.tolerancia)||'').trim().toLowerCase() === 'sim';
        const status        = isCancelado ? 'cancelado' : 'pago';

        // isPago: regra universal calculada uma vez — módulos fazem filter(d=>d.isPago)
        const fp = formaPagamento.toLowerCase();
        const isPago = status === 'pago'
          && valorPago > 0
          && !tolerancia
          && fp !== 'n/d'
          && !fp.includes('sem pagamento')
          && !fp.includes('cancelado')
          && !fp.includes('desconto');

        return {
          id: 'r'+i+'_'+Date.now(),
          ticket: String(get(COL.ticket)||'').trim(),
          timestampEntrada: entrada,
          timestampSaida: parseDataHora(get(COL.saida), get(COL.hora_saida)),
          timestampPagamento: pagamento,
          // Pré-computados uma vez aqui — evita recalcular em cada loop de módulo
          diaPagamento:       diaSemana(pagamento),   // 0=Dom…6=Sáb, sempre em BRT
          dataPagamentoStr:   dataStr(pagamento),      // "DD/MM/YYYY" em BRT
          semanaPagamentoStr: semanaStr(pagamento),    // "YYYY-WWW" em BRT (jan1 forçado)
          isPago,
          permanenciaMin: parsePermMin(get(COL.perm)),
          valorPago,
          formaPagamento,
          tolerancia,
          status
        };
      })
      .filter(Boolean);
  }
};

  _kpis(data){

    const permPeriodo = pagos.length
      ? pagos.reduce((s,d) => s + d.permanenciaMin, 0) / pagos.length : 0;

  _renderCharts(data){
    const pagos = data.filter(d => d.isPago);
    const step = this.permInterval;
    const maxMin = 24 * 60;

    // Buckets: "Até HH:MM" — cada bucket cobre (prevMax+1) até m
    const buckets = [];
    let prevMax = -1;
    for(let m = step; m <= maxMin; m += step){
      buckets.push({ label: `Até ${this.minToHHMM(m)}`, min: prevMax+1, max: m });
      prevMax = m;
    }
    // Acima de 24h: Até 48h, Até 72h...
    for(let d = 2; d <= 8; d++){
      buckets.push({ label: `Até ${d*24}h`, min: prevMax+1, max: d*1440 });
      prevMax = d*1440;
    }
    // Catch-all: permanências acima de 192h (veículos esquecidos, erros de registro, etc.)
    buckets.push({ label: `Acima de 192h`, min: prevMax+1, max: Infinity });

    const days = [
      {label:'Domingo', idx:0},
      {label:'Segunda', idx:1},
      {label:'Terça',   idx:2},
      {label:'Quarta',  idx:3},
      {label:'Quinta',  idx:4},
      {label:'Sexta',   idx:5},
      {label:'Sábado',  idx:6}
    ];

    // Monta matrix com totais — single-pass por bucket, usa diaPagamento pré-computado
    const bucketMap = {};
    buckets.forEach(b => {
      bucketMap[b.label] = { label: b.label, counts: {} };
      days.forEach(d => bucketMap[b.label].counts[d.idx] = 0);
      bucketMap[b.label].counts.total = 0;
    });

    pagos.forEach(p => {
      for(const b of buckets){
        if(p.permanenciaMin >= b.min && p.permanenciaMin <= b.max){
          bucketMap[b.label].counts[p.diaPagamento]++;
          bucketMap[b.label].counts.total++;
          break;
        }
      }
    });

    const matrix = buckets
      .map(b => bucketMap[b.label])
      .filter(r => r.counts.total > 0);

    const grandTotal = matrix.reduce((s,r) => s + r.counts.total, 0);

    // Acha os 2 maiores totais para destaque
    const sortedTotals = matrix.map(r => r.counts.total).sort((a,b) => b - a);
    const top1 = sortedTotals[0] || 0;
    const top2 = sortedTotals[1] || 0;

    const colTotals = {};
    days.forEach(d => { colTotals[d.idx] = matrix.reduce((s,r) => s + r.counts[d.idx], 0); });
    colTotals.total = grandTotal;

    const v = n => n === 0
      ? `<span style="color:var(--border)">-</span>`
      : `<span>${n}</span>`;

    const rowStyle = (total) => {
      if(total === top1)  return `background:rgba(91,140,255,.18);`;
      if(total === top2)  return `background:rgba(91,140,255,.09);`;
      return ``;
    };

    const tableHTML = `
      <div style="overflow:auto;max-height:380px;">
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <thead>
            <tr>
              <th style="position:sticky;top:0;left:0;z-index:2;background:var(--panel2);padding:7px 10px;text-align:left;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;">Permanência</th>
              ${days.map(d=>`<th style="position:sticky;top:0;background:var(--panel2);padding:7px 8px;text-align:center;color:var(--muted);border-bottom:2px solid var(--border);">${d.label}</th>`).join('')}
              <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:center;color:var(--accent);border-bottom:2px solid var(--border);">Total</th>
              <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:center;color:var(--accent2);border-bottom:2px solid var(--border);white-space:nowrap;">Participação %</th>
            </tr>
          </thead>
          <tbody>
            ${matrix.map((r,i)=>{
              const pct = grandTotal ? ((r.counts.total / grandTotal) * 100).toFixed(2) : '0.00';
              const isTop = r.counts.total === top1 || r.counts.total === top2;
              const baseStyle = i%2===0 ? 'background:var(--panel);' : 'background:var(--panel2);';
              const highlightStyle = rowStyle(r.counts.total);
              return `
              <tr style="${highlightStyle || baseStyle}">
                <td style="padding:5px 10px;color:var(--accent2);font-weight:600;white-space:nowrap;">${r.label}</td>
                ${days.map(d=>`<td style="padding:5px 8px;text-align:center;">${v(r.counts[d.idx])}</td>`).join('')}
                <td style="padding:5px 10px;text-align:center;font-weight:700;color:var(--text);">${r.counts.total}</td>
                <td style="padding:5px 10px;text-align:center;font-weight:${isTop?'700':'400'};color:${isTop?'var(--warn)':'var(--muted)'};">${pct}%</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--border);">
              <td style="padding:7px 10px;font-weight:700;color:var(--text);">Total</td>
              ${days.map(d=>`<td style="padding:7px 8px;text-align:center;font-weight:700;color:var(--text);">${colTotals[d.idx]||'<span style="color:var(--border)">-</span>'}</td>`).join('')}
              <td style="padding:7px 10px;text-align:center;font-weight:700;color:var(--accent);">${colTotals.total.toLocaleString('pt-BR')}</td>
              <td style="padding:7px 10px;text-align:center;font-weight:700;color:var(--accent2);">100%</td>
            </tr>
          </tfoot>
        </table>
      </div>`;

    document.getElementById('perm-table-wrap').innerHTML = tableHTML;

    if(this.chartRef){ this.chartRef = {}; }
  },
};

    const fmtR = v => 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

    // ---- Tabela cruzada: Receita × Forma × Semana ----
    // Single-pass O(n): acumula receita por semana+forma em um único forEach
    const allFormas = formasSort.map(([f])=>f);
    const semanaMap = new Map(); // chave: semanaPagamentoStr → { vals, total }

      const row = semanaMap.get(wk);

      row.total += d.valorPago;

    const matrix = [...semanaMap.values()]

    document.getElementById('pag-semana-wrap').innerHTML = `
      <div style="overflow:auto;max-height:380px;">
        <table style="width:100%;font-size:12px;border-collapse:collapse;">
          <thead><tr>
            <th style="position:sticky;top:0;left:0;z-index:2;background:var(--panel2);padding:7px 10px;text-align:left;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;">Semana</th>
            ${allFormas.map(f=>`<th style="position:sticky;top:0;background:var(--panel2);padding:7px 8px;text-align:right;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;">${f}</th>`).join('')}
            <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:right;color:var(--accent);border-bottom:2px solid var(--border);">Total</th>
            <th style="position:sticky;top:0;background:var(--panel2);padding:7px 10px;text-align:center;color:var(--accent2);border-bottom:2px solid var(--border);">Part.%</th>
          </tr></thead>
          <tbody>
            ${matrix.map((r,i)=>{
              const pct=grandTotal?((r.total/grandTotal)*100).toFixed(2):'0.00';
              const isTop=r.total===top1||r.total===top2;
              const bg=r.total===top1?'background:rgba(91,140,255,.18);':r.total===top2?'background:rgba(91,140,255,.09);':i%2===0?'background:var(--panel);':'background:var(--panel2);';
              return `<tr style="${bg}">
                <td style="padding:5px 10px;color:var(--accent2);font-weight:600;white-space:nowrap;">${r.label}</td>
                ${allFormas.map(f=>`<td style="padding:5px 8px;text-align:right;">${fmt(r.vals[f]||0)}</td>`).join('')}
                <td style="padding:5px 10px;text-align:right;font-weight:700;color:var(--text);">${fmt(r.total)}</td>
                <td style="padding:5px 10px;text-align:center;font-weight:${isTop?'700':'400'};color:${isTop?'var(--warn)':'var(--muted)'};">${pct}%</td>
              </tr>`;
            }).join('')}
          </tbody>
          <tfoot><tr style="border-top:2px solid var(--border);">
            <td style="padding:7px 10px;font-weight:700;color:var(--text);">Total</td>
            ${allFormas.map(f=>`<td style="padding:7px 8px;text-align:right;font-weight:700;color:var(--text);">${fmt(colTotals[f]||0)}</td>`).join('')}
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:var(--accent);">${fmt(grandTotal)}</td>
            <td style="padding:7px 10px;text-align:center;font-weight:700;color:var(--accent2);">100%</td>

  async _handleImport(files){
    if(!files || !files.length) return;

    // Alerta se já houver dados carregados
    if(Nexus.rawData.length > 0){

      Nexus.rawData = [];
      Nexus.filteredData = [];
      Nexus._filialAtual = null;
    }

    const wrap = document.getElementById('progress-wrap');
    const bar  = document.getElementById('progress-bar');
    wrap.style.display = 'block';
    bar.style.width = '0%';

    await Nexus.importFiles(files, pct=>{ bar.style.width = pct+'%'; });

    // Detecta filial pelo código da garagem no cabeçalho do relatório
    await this._detectarFilial(files[0]);

    setTimeout(()=>{ wrap.style.display='none'; bar.style.width='0%'; }, 600);
    Nexus.applyFilters();

    // Persiste no IndexedDB — sobrescreve slot único (sem acúmulo)
    await NexusDB.save();

    // Re-renderiza o módulo com os novos dados
    const container = document.getElementById('module-view');
    this.render(container);
  },

  async _detectarFilial(file){
    try {
      // Lê o cabeçalho do arquivo para extrair o código da garagem
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, { type: 'array' });
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', range:0 });

      let codigoGaragem = null;
      for(let i = 0; i < Math.min(10, rows.length); i++){
        const row = rows[i];
        for(let j = 0; j < row.length; j++){
          const val = String(row[j]||'').trim();
          // Linha com "Código da Garagem: 000887"
          if(val.toLowerCase().includes('código da garagem') || val.toLowerCase().includes('codigo da garagem')){
            // Pega o valor na próxima célula ou extrai do texto
            const match = val.match(/:\s*(\d{4,9})/);
            if(match) { codigoGaragem = match[1].replace(/^0+/,'').padStart(6,'0'); break; }
            if(row[j+1]) { codigoGaragem = String(row[j+1]).trim().padStart(6,'0'); break; }
          }
          // Ou a célula seguinte tem só o código
          if(val === 'Código da Garagem:' && row[j+1]){
            codigoGaragem = String(row[j+1]).trim().padStart(6,'0');
            break;
          }
        }
        if(codigoGaragem) break;
      }

      if(!codigoGaragem){
        Nexus._filialAtual = { nome: file.name, supervisor: null, gestor: null, naoEncontrada: true };
        return;
      }

      // Busca no Supabase pelo código da garagem
      const { data: filial } = await supa
        .from('na_filiais')
        .select('nome, na_supervisores(nome, na_gestores(nome))')
        .eq('codigo_garagem', codigoGaragem)
        .single();

      if(filial){
        Nexus._filialAtual = {
          nome: filial.nome,
          supervisor: filial.na_supervisores?.nome || null,
          gestor: filial.na_supervisores?.na_gestores?.nome || null,
          naoEncontrada: false
        };
      } else {
        Nexus._filialAtual = {
          nome: `Garagem ${codigoGaragem}`,
          supervisor: null, gestor: null, naoEncontrada: true
        };
      }
    } catch(e){
      console.warn('Erro ao detectar filial:', e);
      Nexus._filialAtual = null;
    }
  }
};

      .eq('email', email)
      .single();

    const tokenAindaValido = usuarioAtual?.token_acao
      && usuarioAtual?.token_expira
      && new Date(usuarioAtual.token_expira) > new Date();

    if(!tokenAindaValido){
      const token = crypto.randomUUID();
      const expira = new Date(Date.now() + 48*60*60*1000).toISOString();
      await supa.from('na_usuarios').update({ token_acao: token, token_expira: expira }).eq('email', email);
      await this._notificarEmail(nome, email, token);
    }

    // Mostra tela de pendente
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('pending-screen').style.display = 'flex';
    document.getElementById('pending-msg').textContent = 'Solicitação enviada! Aguarde a aprovação do administrador.';
  },

  async _notificarEmail(nome, email, token){
    try {
      const linkAprovar  = `${BASE_URL}?acao=aprovar&token=${token}`;
      const linkRejeitar = `${BASE_URL}?acao=rejeitar&token=${token}`;

      // Envia e-mail de aprovação via Edge Function (RESEND_APIKEY guardada no server-side)
      const { error: fnError } = await supa.functions.invoke('send-approval-email', {
        body: { nome, email, linkAprovar, linkRejeitar }
      });
      if (fnError) console.warn('send-approval-email erro:', fnError);
    } catch(e){ console.warn('Notificação erro:', e); }
  },

  async _processarAcao(acao, token){
    // Busca usuário pelo token
    const { data: usuario } = await supa
      .from('na_usuarios')
      .select('*')
      .eq('token_acao', token)
      .single();

    const container = document.getElementById('login-screen');
    container.style.display = 'flex';
    document.getElementById('pending-screen').style.display = 'none';

    if(!usuario){
      container.innerHTML = `<div class="login-card"><h1>Nexus <span>Analytics</span></h1><p style="color:var(--danger);">Token inválido ou já utilizado.</p></div>`;
      return;
    }

    // Verifica expiração
    if(new Date(usuario.token_expira) < new Date()){
      container.innerHTML = `<div class="login-card"><h1>Nexus <span>Analytics</span></h1><p style="color:var(--warn);">Link expirado (válido por 48h). Peça ao usuário que tente entrar novamente.</p></div>`;
      return;
    }

    const novoStatus = acao === 'aprovar' ? 'aprovado' : 'bloqueado';
    await supa.from('na_usuarios').update({
      status: novoStatus,
      token_acao: null,
      token_expira: null,
      aprovado_em: acao === 'aprovar' ? new Date().toISOString() : null
    }).eq('token_acao', token);

    const emoji = acao === 'aprovar' ? '✅' : '❌';
    const msg   = acao === 'aprovar'
      ? `Acesso de <strong>${usuario.nome || usuario.email}</strong> aprovado com sucesso!`
      : `Acesso de <strong>${usuario.nome || usuario.email}</strong> rejeitado.`;

    container.innerHTML = `
      <div class="login-card">
        <h1>Nexus <span>Analytics</span></h1>
        <div style="font-size:40px;margin:16px 0;">${emoji}</div>
        <p style="font-size:15px;">${msg}</p>
        <button class="btn-google" onclick="window.location.href='${BASE_URL}'" style="margin-top:16px;">Ir para o Nexus Analytics</button>
      </div>`;

    // Limpa a URL
    window.history.replaceState({}, document.title, BASE_URL);
  },

  async login(){
    await supa.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href, queryParams: { prompt: 'select_account' } }
    });
  },

  async logout(){
    if(!confirm('Deseja sair do Nexus Analytics?')) return;
    await supa.auth.signOut();
  },

  _onLogin(){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('pending-screen').style.display = 'none';
    document.getElementById('shell').style.display = '';
    const nome = this.user?.user_metadata?.full_name || this.user?.email || '';
    document.getElementById('user-name').textContent = nome.split(' ')[0];
    await Nexus.initAsync();
  },

  async log(tabela, operacao, registro_id, dados_antes, dados_depois){
    await supa.from('na_log_alteracoes').insert({
      tabela, operacao, registro_id, dados_antes, dados_depois,
      usuario_email: this.user?.email
    });
  }
};

/* ======================================================================
   NEXUS DB — Persistência local via IndexedDB
   Slot único (current_report): sobrescreve a cada importação, sem acúmulo.
   Suporta o volume real de 67k+ linhas que estoura sessionStorage/localStorage.
   ====================================================================== */
const NexusDB = {
  _db: null,
  DB_NAME:    'nexus_analytics',
  DB_VERSION: 1,
  STORE:      'reports',
  KEY:        'current_report',

  open(){
    return new Promise((resolve, reject) => {
      if(this._db) return resolve(this._db);
      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore(this.STORE, { keyPath: 'id' });
      };
      req.onsuccess = e => { this._db = e.target.result; resolve(this._db); };
      req.onerror   = e => { console.warn('NexusDB.open erro:', e.target.error); reject(e.target.error); };
    });
  },

  async save(){
    try {
      const db = await this.open();
      return new Promise((resolve, reject) => {
        const tx  = db.transaction(this.STORE, 'readwrite');
        const req = tx.objectStore(this.STORE).put({
          id:      this.KEY,
          data:    Nexus.rawData,
          filial:  Nexus._filialAtual || null,
          savedAt: Date.now()
        });
        req.onsuccess = () => resolve();
        req.onerror   = e  => { console.warn('NexusDB.save erro:', e.target.error); reject(e.target.error); };
      });
    } catch(e){ console.warn('NexusDB.save falhou:', e); }
  },

  async load(){
    try {
      const db = await this.open();
      return new Promise((resolve) => {
        const req = db.transaction(this.STORE, 'readonly')
                      .objectStore(this.STORE)
                      .get(this.KEY);
        req.onsuccess = e => resolve(e.target.result || null);
        req.onerror   = () => resolve(null);
      });
    } catch(e){ console.warn('NexusDB.load falhou:', e); return null; }
  },

  async clear(){
    try {
      const db = await this.open();
      return new Promise((resolve) => {
        const req = db.transaction(this.STORE, 'readwrite')
                      .objectStore(this.STORE)
                      .delete(this.KEY);
        req.onsuccess = () => resolve();
        req.onerror   = () => resolve();
      });
    } catch(e){ console.warn('NexusDB.clear falhou:', e); }
  }
};

        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <input type="file" id="f-import-input" accept=".xlsb,.xlsx,.xls" style="display:none;">
          <button class="btn-primary" id="btn-import-filiais">📂 Importar arquivo de filiais</button>
          <span id="import-msg" style="font-size:12px;color:var(--accent2);"></span>
        </div>
        <div id="import-progress" style="display:none;margin-top:12px;">
          <div style="height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;">
            <div id="import-bar" style="height:100%;width:0%;background:var(--accent);transition:.2s;"></div>
          </div>
          <div id="import-status" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
        </div>
      </div>

      <div class="panel" style="margin-bottom:14px;">
        <h2>Adicionar filial manualmente</h2>
        <div class="form-grid">
          <div class="form-group"><label>Código da Garagem</label><input id="f-cod" placeholder="ex: 000887"></div>
          <div class="form-group"><label>Nome</label><input id="f-nome" placeholder="Nome da filial"></div>
          <div class="form-group"><label>Estado</label><input id="f-estado" placeholder="RJ"></div>
          <div class="form-group"><label>Regional</label><input id="f-regional" placeholder="ex: Regional Sul"></div>
          <div class="form-group"><label>Gestor</label>
            <select id="f-gestor-sel">
              <option value="">Selecione o gestor</option>
              ${(gestores||[]).map(g=>`<option value="${g.id}">${g.nome}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Supervisor</label>
            <select id="f-sup-sel" disabled>
              <option value="">Selecione o gestor primeiro</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" id="btn-add-filial">+ Adicionar Filial</button>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
          <h2 style="margin:0;">Filiais cadastradas <span style="color:var(--muted);font-size:12px;font-weight:400;">(${(filiais||[]).length})</span></h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <select id="filtro-gestor-fil" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;">
              <option value="">Todos os gestores</option>
              ${(gestores||[]).map(g=>`<option value="${g.id}">${g.nome}</option>`).join('')}
            </select>
            <select id="filtro-sup-fil" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;">
              <option value="">Todos os supervisores</option>
              ${(supervisores||[]).map(s=>`<option value="${s.id}">${s.nome}</option>`).join('')}
            </select>
            <input type="text" id="f-busca" placeholder="Buscar filial..." style="padding:6px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;">
            <label style="font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;">
              <input type="checkbox" id="chk-inativos-f" style="margin-right:4px;">Mostrar encerradas
            </label>
          </div>
        </div>
        <div style="max-height:440px;overflow:auto;">
          <table class="data-table" id="filiais-table">
            <thead><tr><th>Cód.</th><th>Nome</th><th>Estado</th><th>Regional</th><th>Gestor</th><th>Supervisor</th><th>Status</th><th></th></tr></thead>
            <tbody id="filiais-tbody">
              ${this._renderFiliaisRows(filiais||[], '')}
            </tbody>
          </table>
        </div>
      </div>`;

    // Cascading select gestor → supervisor no formulário
    const gestorSel = el.querySelector('#f-gestor-sel');
    const supSel    = el.querySelector('#f-sup-sel');
    gestorSel.onchange = ()=>{
      const gId = gestorSel.value;
      const sups = gId ? (supsPorGestor[gId]||[]) : (supervisores||[]);
      supSel.innerHTML = `<option value="">Selecione o supervisor</option>${sups.map(s=>`<option value="${s.id}">${s.nome}</option>`).join('')}`;
      supSel.disabled = !gId;
    };

    // Filtros da listagem
    const aplicarFiltros = ()=>{
      const gId  = el.querySelector('#filtro-gestor-fil').value;
      const sId  = el.querySelector('#filtro-sup-fil').value;
      const busca = el.querySelector('#f-busca').value.toLowerCase();
      const inat  = el.querySelector('#chk-inativos-f').checked;
      let lista = filiais||[];
      if(!inat) lista = lista.filter(f=>f.status==='ativa');
      if(gId)   lista = lista.filter(f=>f.na_supervisores?.na_gestores?.id===gId || f.na_supervisores?.gestor_id===gId);
      if(sId)   lista = lista.filter(f=>f.supervisor_id===sId);
      if(busca)  lista = lista.filter(f=>f.nome.toLowerCase().includes(busca));
      el.querySelector('#filiais-tbody').innerHTML = this._renderFiliaisRows(lista, '');
      this._bindFiliaisEvents(el, supervisores||[], gestores||[], supsPorGestor);
    };

    ['#filtro-gestor-fil','#filtro-sup-fil','#f-busca','#chk-inativos-f'].forEach(sel=>{
      el.querySelector(sel).addEventListener('change', aplicarFiltros);
      el.querySelector(sel).addEventListener('input', aplicarFiltros);
    });

    // Importação do arquivo
    el.querySelector('#btn-import-filiais').onclick = ()=> el.querySelector('#f-import-input').click();
    el.querySelector('#f-import-input').onchange = async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      await this._importarFiliais(file, el);
    };

    // Adicionar manualmente
    el.querySelector('#btn-add-filial').onclick = async ()=>{
      const nome = el.querySelector('#f-nome').value.trim();
      if(!nome) return alert('Nome é obrigatório.');
      const { data, error } = await supa.from('na_filiais').insert({
        codigo_garagem: el.querySelector('#f-cod').value.trim() || null,
        nome, estado: el.querySelector('#f-estado').value.trim(),
        regional: el.querySelector('#f-regional').value.trim() || null,
        supervisor_id: el.querySelector('#f-sup-sel').value || null
      }).select().single();
      if(error) return alert('Erro: '+(error.message.includes('unique')?'Código já cadastrado.':error.message));
      await NexusAuth.log('na_filiais','INSERT',data.id,null,data);
      this._abaFiliais(el);
    };

    this._bindFiliaisEvents(el, supervisores||[], gestores||[], supsPorGestor);
  },

  _renderFiliaisRows(lista, _){
    if(!lista.length) return '<tr><td colspan="8" style="color:var(--muted)">Nenhuma filial encontrada</td></tr>';
    return lista.map(f=>`
      <tr>
        <td style="font-family:monospace;font-size:12px;">${f.codigo_garagem||'—'}</td>
        <td>${f.nome}</td>
        <td>${f.estado||'—'}</td>
        <td>${f.regional||'—'}</td>
        <td>${f.na_supervisores?.na_gestores?.nome||'—'}</td>
        <td>${f.na_supervisores?.nome||'—'}</td>
        <td><span class="badge-${f.status}">${f.status.charAt(0).toUpperCase()+f.status.slice(1)}</span></td>
        <td style="white-space:nowrap;">
          <button class="btn-edit-sm" data-id="${f.id}"
            data-cod="${f.codigo_garagem||''}" data-nome="${f.nome}"
            data-estado="${f.estado||''}" data-sup="${f.supervisor_id||''}">Editar</button>
          <select class="sel-status" data-id="${f.id}" data-antes="${f.status}"
            style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 6px;font-size:11px;">
            <option ${f.status==='ativa'?'selected':''} value="ativa">Ativa</option>
            <option ${f.status==='encerrada'?'selected':''} value="encerrada">Encerrada</option>
            <option ${f.status==='suspensa'?'selected':''} value="suspensa">Suspensa</option>
          </select>
        </td>
      </tr>`).join('');
  },

  _bindFiliaisEvents(el, supervisores, gestores, supsPorGestor){
    // Editar filial com cascading select
    el.querySelectorAll('.btn-edit-sm').forEach(btn=>{
      btn.onclick = async ()=>{
        const nome = prompt('Nome da filial:', btn.dataset.nome);
        if(!nome) return;
        const cod = prompt('Código da garagem:', btn.dataset.cod);
        if(cod===null) return;
        const estado = prompt('Estado (UF):', btn.dataset.estado);
        if(estado===null) return;

        // Seleciona gestor
        const gestorNomes = gestores.map((g,i)=>`${i+1}. ${g.nome}`).join('\n');
        const gestorIdx = parseInt(prompt(`Gestor:\n${gestorNomes}\n\nDigite o número:`)) - 1;
        const gestor = gestores[gestorIdx];
        if(!gestor && gestorIdx !== -2) { alert('Gestor inválido.'); return; }

        let supId = null;
        if(gestor){
          const sups = supsPorGestor[gestor.id] || supervisores.filter(s=>s.gestor_id===gestor.id);
          if(sups.length){
            const supNomes = sups.map((s,i)=>`${i+1}. ${s.nome}`).join('\n');
            const supIdx = parseInt(prompt(`Supervisor:\n${supNomes}\n\nDigite o número:`)) - 1;
            supId = sups[supIdx]?.id || null;
          }
        }

        const { data } = await supa.from('na_filiais')
          .update({ nome, codigo_garagem: cod||null, estado, supervisor_id: supId })
          .eq('id', btn.dataset.id).select().single();
        await NexusAuth.log('na_filiais','UPDATE',btn.dataset.id,null,data);
        this._abaFiliais(el);
      };
    });

    el.querySelectorAll('.sel-status').forEach(sel=>{
      sel.onchange = async ()=>{
        const antes = sel.dataset.antes;
        const { data } = await supa.from('na_filiais').update({status:sel.value}).eq('id',sel.dataset.id).select().single();
        await NexusAuth.log('na_filiais','UPDATE',sel.dataset.id,{status:antes},{status:sel.value});
        sel.dataset.antes = sel.value;
      };
    });
  },

  async _importarFiliais(file, el){
    const msg    = el.querySelector('#import-msg');
    const prog   = el.querySelector('#import-progress');
    const bar    = el.querySelector('#import-bar');
    const status = el.querySelector('#import-status');
    prog.style.display = 'block';
    msg.textContent = '';

    try {
      const buf  = await file.arrayBuffer();
      const wb   = XLSX.read(buf, { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });

      status.textContent = `Lendo ${rows.length} linhas...`;

      // ── Detecção inteligente de colunas pelo cabeçalho ──────────
      // Procura a linha de cabeçalho nas primeiras 5 linhas
      let headerRowIdx = -1;
      let colMap = {};
      const KEYWORDS = {
        gestor:     ['gestor','gerente'],
        supervisor: ['supervisor'],
        nome:       ['nome','garagem','filial'],
        codigo:     ['código','codigo','cod garagem','cod. garagem'],
        estado:     ['estado','uf'],
        regional:   ['regional'],
        status:     ['status','situação','situacao']
      };

      for(let r = 0; r < Math.min(5, rows.length); r++){
        const row = rows[r];
        const tempMap = {};
        row.forEach((cell, colIdx) => {
          const cellLower = String(cell||'').toLowerCase().trim();
          for(const [campo, palavras] of Object.entries(KEYWORDS)){
            if(palavras.some(p => cellLower.includes(p)) && !tempMap[campo]){
              tempMap[campo] = colIdx;
            }
          }
        });
        // Considera cabeçalho válido se achou pelo menos nome e código
        if(tempMap.nome !== undefined && tempMap.codigo !== undefined){
          headerRowIdx = r;
          colMap = tempMap;
          break;
        }
      }

      if(headerRowIdx === -1){
        // Fallback: tenta formato legado Export_Attributes_CC (Metas_2026.xlsb)
        await this._importarFiliaisLegacy(rows, el, msg, bar, status);
        return;
      }

      status.textContent = `Cabeçalho identificado na linha ${headerRowIdx+1}. Colunas: ${Object.keys(colMap).join(', ')}`;

      // ── Extrai dados usando o mapa de colunas detectado ──────────
      const gestoresMap     = {};
      const supervisoresMap = {};
      const garagens = [];

      rows.slice(headerRowIdx+1).forEach(row=>{
        const gestor   = colMap.gestor     !== undefined ? String(row[colMap.gestor]||'').trim()     : '';
        const sup      = colMap.supervisor !== undefined ? String(row[colMap.supervisor]||'').trim() : '';
        const nome     = colMap.nome       !== undefined ? String(row[colMap.nome]||'').trim()       : '';
        const cod      = colMap.codigo     !== undefined ? String(row[colMap.codigo]||'').trim()     : '';
        const estado   = colMap.estado     !== undefined ? String(row[colMap.estado]||'').trim()     : '';
        const regional = colMap.regional   !== undefined ? String(row[colMap.regional]||'').trim()   : '';
        const st       = colMap.status     !== undefined ? String(row[colMap.status]||'').trim().toLowerCase() : '';

        if(gestor) gestoresMap[gestor] = gestoresMap[gestor] || null;
        if(sup && gestor) supervisoresMap[sup] = supervisoresMap[sup] || { gestorNome: gestor, id: null };
        else if(sup && !supervisoresMap[sup]) supervisoresMap[sup] = { gestorNome: null, id: null };
        if(nome && cod) garagens.push({ gestor, sup, nome, cod, estado, regional, status: st.includes('encerr')?'encerrada':'ativa' });
      });

      if(garagens.length === 0){
        status.textContent = 'Nenhuma filial encontrada no arquivo (verifique se há Nome e Código preenchidos).';
        msg.style.color = 'var(--danger)';
        msg.textContent = 'Nenhum dado válido encontrado';
        return;
      }

      bar.style.width = '10%';
      status.textContent = `${garagens.length} garagens · ${Object.keys(supervisoresMap).length} supervisores · ${Object.keys(gestoresMap).length} gestor(es)`;

      // 1. Gestores
      const { data: gestoresExist } = await supa.from('na_gestores').select('id,nome');
      (gestoresExist||[]).forEach(g=>{ if(gestoresMap.hasOwnProperty(g.nome)) gestoresMap[g.nome] = g.id; });
      for(const nomeG of Object.keys(gestoresMap)){
        if(!gestoresMap[nomeG]){
          const { data } = await supa.from('na_gestores').insert({ nome: nomeG }).select().single();
          if(data){ gestoresMap[nomeG] = data.id; await NexusAuth.log('na_gestores','INSERT',data.id,null,data); }
        }
      }
      bar.style.width = '25%';

      // 2. Supervisores
      const { data: supsExist } = await supa.from('na_supervisores').select('id,nome');
      (supsExist||[]).forEach(s=>{ if(supervisoresMap[s.nome]) supervisoresMap[s.nome].id = s.id; });
      for(const [nomeS, info] of Object.entries(supervisoresMap)){
        if(!info.id){
          const gestorId = info.gestorNome ? (gestoresMap[info.gestorNome] || null) : null;
          const { data } = await supa.from('na_supervisores').insert({ nome: nomeS, gestor_id: gestorId }).select().single();
          if(data){ info.id = data.id; await NexusAuth.log('na_supervisores','INSERT',data.id,null,data); }
        }
      }
      bar.style.width = '40%';

      // 3. Filiais
      const { data: filiaisExist } = await supa.from('na_filiais').select('id,nome,codigo_garagem,status');
      const porCod  = {};
      const porNome = {};
      (filiaisExist||[]).forEach(f=>{
        if(f.codigo_garagem) porCod[f.codigo_garagem] = f;
        porNome[f.nome.toLowerCase()] = f;
      });

      const nomsArquivo = new Set(garagens.map(g=>g.nome.toLowerCase()));
      let inseridas=0, atualizadas=0, encerradas=0;

      for(const ex of (filiaisExist||[])){
        if(ex.status==='ativa' && !nomsArquivo.has(ex.nome.toLowerCase())){
          await supa.from('na_filiais').update({status:'encerrada'}).eq('id',ex.id);
          encerradas++;
        }
      }

      let i=0;
      for(const g of garagens){
        i++;
        bar.style.width = Math.round(40+(i/garagens.length)*55)+'%';
        if(i%10===0) status.textContent = `Processando ${i}/${garagens.length}...`;
        const supId     = g.sup ? (supervisoresMap[g.sup]?.id || null) : null;
        const existente = (g.cod && porCod[g.cod]) || porNome[g.nome.toLowerCase()];
        if(existente){
          await supa.from('na_filiais').update({
            nome: g.nome, codigo_garagem: g.cod || existente.codigo_garagem,
            estado: g.estado||null, regional: g.regional||null,
            supervisor_id: supId, status: g.status
          }).eq('id', existente.id);
          atualizadas++;
        } else {
          const { data } = await supa.from('na_filiais').insert({
            nome: g.nome, codigo_garagem: g.cod || null,
            estado: g.estado||null, regional: g.regional||null,
            supervisor_id: supId, status: g.status
          }).select().single();
          if(data){ await NexusAuth.log('na_filiais','INSERT',data.id,null,data); inseridas++; }
        }
      }

      bar.style.width = '100%';
      status.textContent = `✓ ${inseridas} inseridas · ${atualizadas} atualizadas · ${encerradas} encerradas.`;
      msg.style.color = 'var(--accent2)';
      msg.textContent = `✓ Importação concluída`;
      setTimeout(()=>{ this._abaFiliais(el); }, 2000);

    } catch(err){
      status.textContent = 'Erro: '+err.message;
      msg.style.color = 'var(--danger)';
      msg.textContent = 'Erro na importação';
      console.error(err);
    }
  },

  async _importarFiliaisLegacy(rows, el, msg, bar, status){
    const garagens = [];
    rows.forEach(row=>{
      const cel = String(row[0]||'').trim();
      if(cel.includes(' - ')){
        const cod_cc = cel.split(' - ')[0].trim();
        const nome   = cel.split(' - ').slice(1).join(' - ').trim();
        let uf  = String(row[7]||'').replace('UF_','').trim();
        let reg = String(row[8]||'').replace(/^\[\d+-/,'').trim();
        if(nome) garagens.push({ cod_cc, nome, uf, reg });
      }
    });
    bar.style.width = '30%';
    const { data: existentes } = await supa.from('na_filiais').select('id,nome,codigo_cc,status');
    const existMap = {};
    (existentes||[]).forEach(f=>{ existMap[f.nome.toLowerCase()] = f; });
    let inseridas=0, atualizadas=0, i=0;
    for(const g of garagens){
      i++;
      bar.style.width = Math.round(30+(i/garagens.length)*65)+'%';
      const ex = existMap[g.nome.toLowerCase()];
      if(ex){
        if(!ex.codigo_cc){ await supa.from('na_filiais').update({codigo_cc:g.cod_cc,estado:g.uf,regional:g.reg}).eq('id',ex.id); atualizadas++; }
      } else {
        const { data } = await supa.from('na_filiais').insert({nome:g.nome,codigo_cc:g.cod_cc,estado:g.uf,regional:g.reg,status:'ativa'}).select().single();
        if(data){ await NexusAuth.log('na_filiais','INSERT',data.id,null,data); inseridas++; }
      }
    }
    bar.style.width = '100%';
    status.textContent = `✓ ${inseridas} inseridas · ${atualizadas} atualizadas.`;
    msg.style.color = 'var(--accent2)';
    msg.textContent = `✓ Importação concluída`;
    setTimeout(()=>{ this._abaFiliais(el); }, 2000);
  },

  // ── ABA USUÁRIOS (só admin) ─────────────────────────────────────
  async _abaUsuarios(el){
    if(!NexusAuth.isAdmin){ el.innerHTML = '<p style="color:var(--danger);">Acesso restrito ao administrador.</p>'; return; }

    const { data: usuarios } = await supa.from('na_usuarios').select('*').order('criado_em', {ascending:false});

    const statusBadge = s => ({
      aprovado:  `<span style="color:var(--accent2);font-weight:600;">✅ Aprovado</span>`,
      pendente:  `<span style="color:var(--warn);font-weight:600;">⏳ Pendente</span>`,
      bloqueado: `<span style="color:var(--danger);font-weight:600;">❌ Bloqueado</span>`
    }[s] || s);

    const papelBadge = p => p === 'admin'
      ? `<span style="color:var(--accent);font-size:11px;font-weight:600;">👑 Admin</span>`
      : `<span style="color:var(--muted);font-size:11px;">Usuário</span>`;

    el.innerHTML = `
      <div class="panel">
        <h2>Usuários (${(usuarios||[]).length})</h2>
        <table class="data-table">
          <thead><tr><th>Nome</th><th>E-mail</th><th>Papel</th><th>Status</th><th>Desde</th><th></th></tr></thead>
          <tbody>
            ${(usuarios||[]).map(u=>`
              <tr>
                <td>${u.nome||'—'}</td>
                <td style="font-size:12px;">${u.email}</td>
                <td>${papelBadge(u.papel||'usuario')}</td>
                <td>${statusBadge(u.status)}</td>
                <td style="font-size:12px;color:var(--muted);">${new Date(u.criado_em).toLocaleDateString('pt-BR')}</td>
                <td style="white-space:nowrap;">
                  ${u.email !== ADMIN_EMAIL ? `
                    <select class="sel-papel" data-id="${u.id}"
                      style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 6px;font-size:11px;margin-right:4px;">
                      <option value="usuario" ${(u.papel||'usuario')==='usuario'?'selected':''}>Usuário</option>
                      <option value="admin"   ${u.papel==='admin'?'selected':''}>Admin</option>
                    </select>
                    ${u.status !== 'aprovado'  ? `<button class="btn-edit-sm btn-aprovar"    data-id="${u.id}">Aprovar</button>` : ''}
                    ${u.status !== 'bloqueado' ? `<button class="btn-danger-sm btn-bloquear" data-id="${u.id}">Bloquear</button>` : ''}
                    ${u.status === 'bloqueado' ? `<button class="btn-edit-sm btn-reativar"   data-id="${u.id}">Reativar</button>` : ''}
                  ` : '<span style="font-size:11px;color:var(--muted);">👑 Admin</span>'}
                </td>
              </tr>`).join('') || '<tr><td colspan="6" style="color:var(--muted)">Nenhum usuário</td></tr>'}
          </tbody>
        </table>
      </div>`;

    el.querySelectorAll('.sel-papel').forEach(sel=>{
      sel.onchange = async ()=>{
        await supa.from('na_usuarios').update({ papel: sel.value }).eq('id', sel.dataset.id);
        await NexusAuth.log('na_usuarios','UPDATE',sel.dataset.id,null,{papel:sel.value});
      };
    });

    el.querySelectorAll('.btn-aprovar').forEach(btn=>{
      btn.onclick = async ()=>{
        const sel = btn.closest('tr').querySelector('.sel-papel');
        const papel = sel ? sel.value : 'usuario';
        await supa.from('na_usuarios').update({
          status: 'aprovado', papel,
          token_acao: null, token_expira: null,
          aprovado_em: new Date().toISOString()
        }).eq('id', btn.dataset.id);
        await NexusAuth.log('na_usuarios','UPDATE',btn.dataset.id,null,{status:'aprovado',papel});
        this._abaUsuarios(el);
      };
    });

    el.querySelectorAll('.btn-bloquear').forEach(btn=>{
      btn.onclick = async ()=>{
        await supa.from('na_usuarios').update({ status:'bloqueado', token_acao:null, token_expira:null }).eq('id', btn.dataset.id);
        await NexusAuth.log('na_usuarios','UPDATE',btn.dataset.id,null,{status:'bloqueado'});
        this._abaUsuarios(el);
      };
    });

    el.querySelectorAll('.btn-reativar').forEach(btn=>{
      btn.onclick = async ()=>{
        await supa.from('na_usuarios').update({ status:'aprovado', aprovado_em: new Date().toISOString() }).eq('id', btn.dataset.id);
        await NexusAuth.log('na_usuarios','UPDATE',btn.dataset.id,null,{status:'aprovado'});
        this._abaUsuarios(el);
      };

    });
  },

  // ── ABA LOG ─────────────────────────────────────────────────────
  async _abaLog(el){
    if(!NexusAuth.isAdmin){ el.innerHTML = '<p style="color:var(--danger);">Acesso restrito ao administrador.</p>'; return; }
    const { data: logs } = await supa.from('na_log_alteracoes')
      .select('*').order('criado_em',{ascending:false}).limit(100);

    el.innerHTML = `
      <div class="panel">
        <h2>Últimas 100 alterações</h2>
        <table class="data-table">
          <thead><tr><th>Data/Hora</th><th>Usuário</th><th>Tabela</th><th>Operação</th></tr></thead>
          <tbody>
            ${(logs||[]).map(l=>`
              <tr>
                <td style="white-space:nowrap;">${new Date(l.criado_em).toLocaleString('pt-BR')}</td>
                <td>${l.usuario_email||'—'}</td>
                <td style="font-family:monospace;font-size:11px;">${l.tabela}</td>
                <td><span style="color:${l.operacao==='DELETE'?'var(--danger)':l.operacao==='INSERT'?'var(--accent2)':'var(--warn)'};">${l.operacao}</span></td>
              </tr>`).join('') || '<tr><td colspan="4" style="color:var(--muted)">Nenhuma alteração registrada</td></tr>'}
          </tbody>
        </table>
      </div>`;
  }
};

/* ---------------- Registro dos módulos (após todas as definições) ---------------- */
Nexus.registerModule(ModuloRelatorios);
Nexus.registerModule(ModuloPermanencia);
Nexus.registerModule(ModuloReceita);
Nexus.registerModule(ModuloPagamentos);

// Inicia após todos os scripts carregarem
window.addEventListener('load', async () => {
  Nexus.registerModule(ModuloConfiguracoes);
  document.getElementById('shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  await NexusAuth.init();
});

</script>
