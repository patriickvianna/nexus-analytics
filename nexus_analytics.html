const ModuloConfiguracoes = {
  id: 'config',
  nome: 'Configurações',
  icon: '⚙️',
  abaAtiva: 'filiais',

  renderFilters(container){ container.innerHTML = ''; },

  render(container){
    container.innerHTML = `
      <div class="config-tabs">
        <div class="config-tab ${this.abaAtiva==='filiais'?'active':''}"   data-aba="filiais">Filiais</div>
        <div class="config-tab ${this.abaAtiva==='supervisores'?'active':''}" data-aba="supervisores">Supervisores</div>
        <div class="config-tab ${this.abaAtiva==='gestores'?'active':''}"  data-aba="gestores">Gestores</div>
        <div class="config-tab ${this.abaAtiva==='budgets'?'active':''}"   data-aba="budgets">Budgets</div>
        <div class="config-tab ${this.abaAtiva==='log'?'active':''}"       data-aba="log">Log</div>
      </div>
      <div id="config-content"></div>
    `;
    container.querySelectorAll('.config-tab').forEach(tab=>{
      tab.onclick = ()=>{
        this.abaAtiva = tab.dataset.aba;
        this.render(container);
      };
    });
    this._renderAba(container.querySelector('#config-content'));
  },

  async _renderAba(el){
    el.innerHTML = '<div style="color:var(--muted);padding:20px;">Carregando...</div>';
    switch(this.abaAtiva){
      case 'filiais':      await this._abaFiliais(el);      break;
      case 'supervisores': await this._abaSupervisores(el); break;
      case 'gestores':     await this._abaGestores(el);     break;
      case 'budgets':      await this._abaBudgets(el);      break;
      case 'log':          await this._abaLog(el);          break;
    }
  },

  // ── ABA GESTORES ────────────────────────────────────────────────
  async _abaGestores(el){
    const { data: gestores } = await supa.from('na_gestores')
      .select('*, na_supervisores(id,nome,ativo,na_filiais(id,nome,status))')
      .order('nome');

    const ativos   = (gestores||[]).filter(g=>g.ativo);
    const inativos = (gestores||[]).filter(g=>!g.ativo);
    const [mostrarInativos, setMostrarInativos] = [false];

    const renderGestores = (lista, mostrarInativ) => {
      const todos = mostrarInativ ? lista : lista.filter(g=>g.ativo);
      return todos.map(g => {
        const sups = (g.na_supervisores||[]).filter(s=>s.ativo);
        const totalFiliais = sups.reduce((s,sv)=>(sv.na_filiais||[]).filter(f=>f.status==='ativa').length+s,0);
        return `
        <div style="background:var(--panel2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;" onclick="this.parentElement.querySelector('.g-body').style.display=this.parentElement.querySelector('.g-body').style.display==='none'?'block':'none'">
            <div>
              <span style="font-weight:700;color:var(--text);">👤 ${g.nome}</span>
              ${g.email?`<span style="font-size:11px;color:var(--muted);margin-left:8px;">${g.email}</span>`:''}
              <span style="font-size:11px;color:var(--muted);margin-left:12px;">${sups.length} supervisor(es) · ${totalFiliais} filial(is)</span>
            </div>
            <div style="display:flex;gap:6px;">
              <button class="btn-edit-sm" data-id="${g.id}" data-nome="${g.nome}" data-email="${g.email||''}">Editar</button>
              <button class="btn-toggle" data-id="${g.id}" data-ativo="${g.ativo}" style="background:none;border:1px solid ${g.ativo?'var(--warn)':'var(--accent2)'};color:${g.ativo?'var(--warn)':'var(--accent2)'};padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;">${g.ativo?'Desativar':'Reativar'}</button>
            </div>
          </div>
          <div class="g-body" style="display:none;padding:0 16px 12px;">
            ${sups.length===0?'<p style="color:var(--muted);font-size:12px;">Nenhum supervisor vinculado.</p>':
              sups.map(sv=>{
                const fils = (sv.na_filiais||[]).filter(f=>f.status==='ativa');
                return `<div style="margin-bottom:8px;padding:8px;background:var(--panel);border-radius:8px;">
                  <div style="font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:4px;">↳ ${sv.nome}</div>
                  ${fils.length===0?'<span style="font-size:11px;color:var(--muted);">Sem filiais ativas</span>':
                    fils.map(f=>`<span style="display:inline-block;font-size:11px;background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin:2px;">${f.nome}</span>`).join('')}
                </div>`;
              }).join('')}
          </div>
        </div>`;
      }).join('');
    };

    el.innerHTML = `
      <div class="panel" style="margin-bottom:14px;">
        <h2>Novo Gestor</h2>
        <div class="form-grid">
          <div class="form-group"><label>Nome</label><input id="g-nome" placeholder="Nome completo"></div>
          <div class="form-group"><label>E-mail</label><input id="g-email" placeholder="email@empresa.com"></div>
        </div>
        <button class="btn-primary" id="btn-add-gestor">+ Adicionar Gestor</button>
      </div>
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <h2 style="margin:0;">Gestores (${ativos.length} ativos)</h2>
          <label style="font-size:12px;color:var(--muted);cursor:pointer;">
            <input type="checkbox" id="chk-inativos-g" style="margin-right:4px;">Mostrar inativos (${inativos.length})
          </label>
        </div>
        <div id="gestores-lista">${renderGestores(gestores||[], false)}</div>
      </div>`;

    el.querySelector('#btn-add-gestor').onclick = async ()=>{
      const nome = el.querySelector('#g-nome').value.trim();
      if(!nome) return alert('Informe o nome.');
      const { data, error } = await supa.from('na_gestores').insert({
        nome, email: el.querySelector('#g-email').value.trim()
      }).select().single();
      if(error) return alert('Erro: '+error.message);
      await NexusAuth.log('na_gestores','INSERT',data.id,null,data);
      this._abaGestores(el);
    };

    el.querySelector('#chk-inativos-g').onchange = e=>{
      el.querySelector('#gestores-lista').innerHTML = renderGestores(gestores||[], e.target.checked);
      this._bindGestoresEvents(el, gestores||[]);
    };

    this._bindGestoresEvents(el, gestores||[]);
  },

  _bindGestoresEvents(el, gestores){
    el.querySelectorAll('.btn-edit-sm').forEach(btn=>{
      btn.onclick = ()=>{
        const nome = prompt('Nome do gestor:', btn.dataset.nome);
        if(!nome) return;
        const email = prompt('E-mail:', btn.dataset.email);
        supa.from('na_gestores').update({nome, email}).eq('id',btn.dataset.id)
          .select().single().then(({data})=>{
            NexusAuth.log('na_gestores','UPDATE',btn.dataset.id,null,data);
            this._abaGestores(el);
          });
      };
    });
    el.querySelectorAll('.btn-toggle').forEach(btn=>{
      btn.onclick = async ()=>{
        const ativo = btn.dataset.ativo === 'true';
        const { data } = await supa.from('na_gestores').update({ativo:!ativo}).eq('id',btn.dataset.id).select().single();
        await NexusAuth.log('na_gestores','UPDATE',btn.dataset.id,{ativo},data);
        this._abaGestores(el);
      };
    });
  },

  // ── ABA SUPERVISORES ────────────────────────────────────────────
  async _abaSupervisores(el){
    const [{ data: supervisores }, { data: gestores }] = await Promise.all([
      supa.from('na_supervisores').select('*, na_gestores(id,nome), na_filiais(id,nome,status)').order('nome'),
      supa.from('na_gestores').select('id,nome').eq('ativo',true).order('nome')
    ]);

    const filtrarPorGestor = (gestorId) => {
      const lista = gestorId
        ? (supervisores||[]).filter(s=>s.gestor_id===gestorId)
        : (supervisores||[]);
      return lista;
    };

    const renderSups = (lista, mostrarInativ) => {
      const todos = mostrarInativ ? lista : lista.filter(s=>s.ativo);
      if(!todos.length) return '<p style="color:var(--muted);font-size:13px;">Nenhum supervisor encontrado.</p>';
      return todos.map(s=>{
        const fils = (s.na_filiais||[]).filter(f=>f.status==='ativa');
        return `
        <div style="background:var(--panel2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;" onclick="this.parentElement.querySelector('.s-body').style.display=this.parentElement.querySelector('.s-body').style.display==='none'?'block':'none'">
            <div>
              <span style="font-weight:600;color:var(--text);">👤 ${s.nome}</span>
              ${s.na_gestores?.nome?`<span style="font-size:11px;color:var(--muted);margin-left:8px;">Gestor: ${s.na_gestores.nome}</span>`:''}
              <span style="font-size:11px;color:var(--muted);margin-left:8px;">${fils.length} filial(is)</span>
            </div>
            <div style="display:flex;gap:6px;">
              <button class="btn-edit-sm" data-id="${s.id}" data-nome="${s.nome}" data-email="${s.email||''}" data-gestor="${s.gestor_id||''}">Editar</button>
              <button class="btn-toggle" data-id="${s.id}" data-ativo="${s.ativo}" style="background:none;border:1px solid ${s.ativo?'var(--warn)':'var(--accent2)'};color:${s.ativo?'var(--warn)':'var(--accent2)'};padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;">${s.ativo?'Desativar':'Reativar'}</button>
            </div>
          </div>
          <div class="s-body" style="display:none;padding:0 16px 12px;">
            ${fils.length===0?'<span style="font-size:12px;color:var(--muted);">Sem filiais ativas vinculadas.</span>':
              fils.map(f=>`<span style="display:inline-block;font-size:11px;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:2px 8px;margin:2px;">${f.nome}</span>`).join('')}
          </div>
        </div>`;
      }).join('');
    };

    el.innerHTML = `
      <div class="panel" style="margin-bottom:14px;">
        <h2>Novo Supervisor</h2>
        <div class="form-grid">
          <div class="form-group"><label>Nome</label><input id="s-nome" placeholder="Nome completo"></div>
          <div class="form-group"><label>E-mail</label><input id="s-email" placeholder="email@empresa.com"></div>
          <div class="form-group"><label>Gestor responsável</label>
            <select id="s-gestor">
              <option value="">Selecione o gestor</option>
              ${(gestores||[]).map(g=>`<option value="${g.id}">${g.nome}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="btn-primary" id="btn-add-sup">+ Adicionar Supervisor</button>
      </div>
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
          <h2 style="margin:0;">Supervisores</h2>
          <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <select id="filtro-gestor-sup" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;">
              <option value="">Todos os gestores</option>
              ${(gestores||[]).map(g=>`<option value="${g.id}">${g.nome}</option>`).join('')}
            </select>
            <label style="font-size:12px;color:var(--muted);cursor:pointer;">
              <input type="checkbox" id="chk-inativos-s" style="margin-right:4px;">Mostrar inativos
            </label>
          </div>
        </div>
        <div id="sups-lista">${renderSups(supervisores||[], false)}</div>
      </div>`;

    const atualizar = ()=>{
      const gId = el.querySelector('#filtro-gestor-sup').value;
      const inat = el.querySelector('#chk-inativos-s').checked;
      el.querySelector('#sups-lista').innerHTML = renderSups(filtrarPorGestor(gId), inat);
      this._bindSupsEvents(el, supervisores||[], gestores||[]);
    };

    el.querySelector('#filtro-gestor-sup').onchange = atualizar;
    el.querySelector('#chk-inativos-s').onchange = atualizar;

    el.querySelector('#btn-add-sup').onclick = async ()=>{
      const nome = el.querySelector('#s-nome').value.trim();
      if(!nome) return alert('Informe o nome.');
      const { data, error } = await supa.from('na_supervisores').insert({
        nome, email: el.querySelector('#s-email').value.trim(),
        gestor_id: el.querySelector('#s-gestor').value || null
      }).select().single();
      if(error) return alert('Erro: '+error.message);
      await NexusAuth.log('na_supervisores','INSERT',data.id,null,data);
      this._abaSupervisores(el);
    };

    this._bindSupsEvents(el, supervisores||[], gestores||[]);
  },

  _bindSupsEvents(el, supervisores, gestores){
    el.querySelectorAll('.btn-edit-sm').forEach(btn=>{
      btn.onclick = ()=>{
        const nome = prompt('Nome do supervisor:', btn.dataset.nome);
        if(!nome) return;
        const email = prompt('E-mail:', btn.dataset.email);
        const gestorId = btn.dataset.gestor;
        // Monta select de gestores
        const gestorNome = gestores.find(g=>g.id===gestorId)?.nome||'Nenhum';
        const novoGestorNome = prompt(`Gestor atual: ${gestorNome}\nDigite o nome do novo gestor (deixe em branco para manter):`, '');
        let novoGestorId = gestorId;
        if(novoGestorNome){
          const encontrado = gestores.find(g=>g.nome.toLowerCase()===novoGestorNome.toLowerCase());
          if(!encontrado){ alert('Gestor não encontrado. Mantendo o atual.'); }
          else novoGestorId = encontrado.id;
        }
        supa.from('na_supervisores').update({nome, email, gestor_id: novoGestorId})
          .eq('id',btn.dataset.id).select().single()
          .then(({data})=>{
            NexusAuth.log('na_supervisores','UPDATE',btn.dataset.id,null,data);
            this._abaSupervisores(el);
          });
      };
    });
    el.querySelectorAll('.btn-toggle').forEach(btn=>{
      btn.onclick = async ()=>{
        const ativo = btn.dataset.ativo === 'true';
        const { data } = await supa.from('na_supervisores').update({ativo:!ativo}).eq('id',btn.dataset.id).select().single();
        await NexusAuth.log('na_supervisores','UPDATE',btn.dataset.id,{ativo},data);
        this._abaSupervisores(el);
      };
    });
  },

  // ── ABA FILIAIS ─────────────────────────────────────────────────
  async _abaFiliais(el){
    const [{ data: filiais }, { data: supervisores }, { data: gestores }] = await Promise.all([
      supa.from('na_filiais').select('*, na_supervisores(id,nome,gestor_id, na_gestores(id,nome))').order('nome'),
      supa.from('na_supervisores').select('id,nome,gestor_id').eq('ativo',true).order('nome'),
      supa.from('na_gestores').select('id,nome').eq('ativo',true).order('nome')
    ]);

    // Mapa gestor → supervisores
    const supsPorGestor = {};
    (supervisores||[]).forEach(s=>{
      if(!supsPorGestor[s.gestor_id]) supsPorGestor[s.gestor_id] = [];
      supsPorGestor[s.gestor_id].push(s);
    });

    el.innerHTML = `
      <div class="panel" style="margin-bottom:14px;">
        <h2>Importar lista de filiais</h2>
        <p style="font-size:13px;color:var(--muted);margin:0 0 12px;">
          Importe o arquivo <strong>Metas_2026.xlsb</strong> — lê a aba <code>Export_Attributes_CC</code>,
          cadastra novas filiais, ignora existentes e marca como <strong>encerrada</strong> as que saírem da lista.
        </p>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <input type="file" id="f-import-input" accept=".xlsb,.xlsx,.xls" style="display:none;">
          <button class="btn-primary" id="btn-import-filiais">📂 Importar arquivo de filiais</button>
          <span id="import-msg" style="font-size:12px;color:var(--accent2);"></span>
        </div>
        <div id="import-progress" style="display:none;margin-top:12px;">
          <div style="height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;">
            <div id="import-bar" style="height:100%;width:0%;background:var(--accent);transition:.2s;"></div>
          </div>
          <div id="import-status" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
        </div>
      </div>

      <div class="panel" style="margin-bottom:14px;">
        <h2>Adicionar filial manualmente</h2>
        <div class="form-grid">
          <div class="form-group"><label>Código da Garagem</label><input id="f-cod" placeholder="ex: 000887"></div>
          <div class="form-group"><label>Nome</label><input id="f-nome" placeholder="Nome da filial"></div>
          <div class="form-group"><label>Estado</label><input id="f-estado" placeholder="RJ"></div>
          <div class="form-group"><label>Gestor</label>
            <select id="f-gestor-sel">
              <option value="">Selecione o gestor</option>
              ${(gestores||[]).map(g=>`<option value="${g.id}">${g.nome}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Supervisor</label>
            <select id="f-sup-sel" disabled>
              <option value="">Selecione o gestor primeiro</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" id="btn-add-filial">+ Adicionar Filial</button>
      </div>

      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
          <h2 style="margin:0;">Filiais cadastradas <span style="color:var(--muted);font-size:12px;font-weight:400;">(${(filiais||[]).length})</span></h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <select id="filtro-gestor-fil" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;">
              <option value="">Todos os gestores</option>
              ${(gestores||[]).map(g=>`<option value="${g.id}">${g.nome}</option>`).join('')}
            </select>
            <select id="filtro-sup-fil" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;">
              <option value="">Todos os supervisores</option>
              ${(supervisores||[]).map(s=>`<option value="${s.id}">${s.nome}</option>`).join('')}
            </select>
            <input type="text" id="f-busca" placeholder="Buscar filial..." style="padding:6px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;">
            <label style="font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap;">
              <input type="checkbox" id="chk-inativos-f" style="margin-right:4px;">Mostrar encerradas
            </label>
          </div>
        </div>
        <div style="max-height:440px;overflow:auto;">
          <table class="data-table" id="filiais-table">
            <thead><tr><th>Cód.</th><th>Nome</th><th>Estado</th><th>Regional</th><th>Gestor</th><th>Supervisor</th><th>Status</th><th></th></tr></thead>
            <tbody id="filiais-tbody">
              ${this._renderFiliaisRows(filiais||[], '')}
            </tbody>
          </table>
        </div>
      </div>`;

    // Cascading select gestor → supervisor no formulário
    const gestorSel = el.querySelector('#f-gestor-sel');
    const supSel    = el.querySelector('#f-sup-sel');
    gestorSel.onchange = ()=>{
      const gId = gestorSel.value;
      const sups = gId ? (supsPorGestor[gId]||[]) : (supervisores||[]);
      supSel.innerHTML = `<option value="">Selecione o supervisor</option>${sups.map(s=>`<option value="${s.id}">${s.nome}</option>`).join('')}`;
      supSel.disabled = !gId;
    };

    // Filtros da listagem
    const aplicarFiltros = ()=>{
      const gId  = el.querySelector('#filtro-gestor-fil').value;
      const sId  = el.querySelector('#filtro-sup-fil').value;
      const busca = el.querySelector('#f-busca').value.toLowerCase();
      const inat  = el.querySelector('#chk-inativos-f').checked;
      let lista = filiais||[];
      if(!inat) lista = lista.filter(f=>f.status==='ativa');
      if(gId)   lista = lista.filter(f=>f.na_supervisores?.na_gestores?.id===gId || f.na_supervisores?.gestor_id===gId);
      if(sId)   lista = lista.filter(f=>f.supervisor_id===sId);
      if(busca)  lista = lista.filter(f=>f.nome.toLowerCase().includes(busca));
      el.querySelector('#filiais-tbody').innerHTML = this._renderFiliaisRows(lista, '');
      this._bindFiliaisEvents(el, supervisores||[], gestores||[], supsPorGestor);
    };

    ['#filtro-gestor-fil','#filtro-sup-fil','#f-busca','#chk-inativos-f'].forEach(sel=>{
      el.querySelector(sel).addEventListener('change', aplicarFiltros);
      el.querySelector(sel).addEventListener('input', aplicarFiltros);
    });

    // Importação do arquivo
    el.querySelector('#btn-import-filiais').onclick = ()=> el.querySelector('#f-import-input').click();
    el.querySelector('#f-import-input').onchange = async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      await this._importarFiliais(file, el);
    };

    // Adicionar manualmente
    el.querySelector('#btn-add-filial').onclick = async ()=>{
      const nome = el.querySelector('#f-nome').value.trim();
      if(!nome) return alert('Nome é obrigatório.');
      const { data, error } = await supa.from('na_filiais').insert({
        codigo_garagem: el.querySelector('#f-cod').value.trim() || null,
        nome, estado: el.querySelector('#f-estado').value.trim(),
        supervisor_id: el.querySelector('#f-sup-sel').value || null
      }).select().single();
      if(error) return alert('Erro: '+(error.message.includes('unique')?'Código já cadastrado.':error.message));
      await NexusAuth.log('na_filiais','INSERT',data.id,null,data);
      this._abaFiliais(el);
    };

    this._bindFiliaisEvents(el, supervisores||[], gestores||[], supsPorGestor);
  },

  _renderFiliaisRows(lista, _){
    if(!lista.length) return '<tr><td colspan="8" style="color:var(--muted)">Nenhuma filial encontrada</td></tr>';
    return lista.map(f=>`
      <tr>
        <td style="font-family:monospace;font-size:12px;">${f.codigo_garagem||'—'}</td>
        <td>${f.nome}</td>
        <td>${f.estado||'—'}</td>
        <td>${f.regional||'—'}</td>
        <td>${f.na_supervisores?.na_gestores?.nome||'—'}</td>
        <td>${f.na_supervisores?.nome||'—'}</td>
        <td><span class="badge-${f.status}">${f.status.charAt(0).toUpperCase()+f.status.slice(1)}</span></td>
        <td style="white-space:nowrap;">
          <button class="btn-edit-sm" data-id="${f.id}"
            data-cod="${f.codigo_garagem||''}" data-nome="${f.nome}"
            data-estado="${f.estado||''}" data-sup="${f.supervisor_id||''}">Editar</button>
          <select class="sel-status" data-id="${f.id}" data-antes="${f.status}"
            style="background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:3px 6px;font-size:11px;">
            <option ${f.status==='ativa'?'selected':''} value="ativa">Ativa</option>
            <option ${f.status==='encerrada'?'selected':''} value="encerrada">Encerrada</option>
            <option ${f.status==='suspensa'?'selected':''} value="suspensa">Suspensa</option>
          </select>
        </td>
      </tr>`).join('');
  },

  _bindFiliaisEvents(el, supervisores, gestores, supsPorGestor){
    // Editar filial com cascading select
    el.querySelectorAll('.btn-edit-sm').forEach(btn=>{
      btn.onclick = async ()=>{
        const nome = prompt('Nome da filial:', btn.dataset.nome);
        if(!nome) return;
        const cod = prompt('Código da garagem:', btn.dataset.cod);
        if(cod===null) return;
        const estado = prompt('Estado (UF):', btn.dataset.estado);
        if(estado===null) return;

        // Seleciona gestor
        const gestorNomes = gestores.map((g,i)=>`${i+1}. ${g.nome}`).join('\n');
        const gestorIdx = parseInt(prompt(`Gestor:\n${gestorNomes}\n\nDigite o número:`)) - 1;
        const gestor = gestores[gestorIdx];
        if(!gestor && gestorIdx !== -2) { alert('Gestor inválido.'); return; }

        let supId = null;
        if(gestor){
          const sups = supsPorGestor[gestor.id] || supervisores.filter(s=>s.gestor_id===gestor.id);
          if(sups.length){
            const supNomes = sups.map((s,i)=>`${i+1}. ${s.nome}`).join('\n');
            const supIdx = parseInt(prompt(`Supervisor:\n${supNomes}\n\nDigite o número:`)) - 1;
            supId = sups[supIdx]?.id || null;
          }
        }

        const { data } = await supa.from('na_filiais')
          .update({ nome, codigo_garagem: cod||null, estado, supervisor_id: supId })
          .eq('id', btn.dataset.id).select().single();
        await NexusAuth.log('na_filiais','UPDATE',btn.dataset.id,null,data);
        this._abaFiliais(el);
      };
    });

    el.querySelectorAll('.sel-status').forEach(sel=>{
      sel.onchange = async ()=>{
        const antes = sel.dataset.antes;
        const { data } = await supa.from('na_filiais').update({status:sel.value}).eq('id',sel.dataset.id).select().single();
        await NexusAuth.log('na_filiais','UPDATE',sel.dataset.id,{status:antes},{status:sel.value});
        sel.dataset.antes = sel.value;
      };
    });
  },

  async _importarFiliais(file, el){
    const msg    = el.querySelector('#import-msg');
    const prog   = el.querySelector('#import-progress');
    const bar    = el.querySelector('#import-bar');
    const status = el.querySelector('#import-status');
    prog.style.display = 'block';
    msg.textContent = '';

    try {
      // Lê o arquivo como ArrayBuffer
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, { type: 'array' });

      // Tenta ler Export_Attributes_CC ou primeira aba disponível
      const sheetName = wb.SheetNames.find(s=>s.includes('Attributes_CC') || s.includes('Export')) || wb.SheetNames[0];
      const ws   = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });

      status.textContent = `Lendo ${rows.length} linhas da aba "${sheetName}"...`;

      // Extrai garagens: col 0 = "CODIGO - NOME", col 3 = segmento, col 7 = UF, col 8 = regional
      const garagens = [];
      rows.forEach(row=>{
        const cel = String(row[0]||'').trim();
        if(cel.includes(' - ')){
          const cod_cc = cel.split(' - ')[0].trim();
          const nome   = cel.split(' - ').slice(1).join(' - ').trim();
          let seg = String(row[3]||'').replace(/^\[/,'').trim();
          let uf  = String(row[7]||'').replace('UF_','').trim();
          let reg = String(row[8]||'').replace(/^\[\d+-/,'').trim();
          if(nome) garagens.push({ cod_cc, nome, seg, uf, reg });
        }
      });

      status.textContent = `${garagens.length} filiais encontradas. Sincronizando com o banco...`;
      bar.style.width = '20%';

      // Busca filiais já cadastradas
      const { data: existentes } = await supa.from('na_filiais').select('id,nome,codigo_cc,status');
      const existMap = {}; // nome.lower → filial
      (existentes||[]).forEach(f=>{ existMap[f.nome.toLowerCase()] = f; });

      const nomes_arquivo = new Set(garagens.map(g=>g.nome.toLowerCase()));
      let inseridas=0, atualizadas=0, encerradas=0;

      // Encerra filiais que não estão mais no arquivo
      for(const ex of (existentes||[])){
        if(ex.status === 'ativa' && !nomes_arquivo.has(ex.nome.toLowerCase())){
          await supa.from('na_filiais').update({status:'encerrada'}).eq('id',ex.id);
          await NexusAuth.log('na_filiais','UPDATE',ex.id,{status:'ativa'},{status:'encerrada'});
          encerradas++;
        }
      }

      bar.style.width = '50%';

      // Insere novas ou atualiza codigo_cc/segmento/regional
      let i=0;
      for(const g of garagens){
        i++;
        bar.style.width = Math.round(50 + (i/garagens.length)*45)+'%';
        const existente = existMap[g.nome.toLowerCase()];
        if(existente){
          // Atualiza campos extras se estiverem vazios
          if(!existente.codigo_cc){
            await supa.from('na_filiais').update({
              codigo_cc: g.cod_cc, segmento: g.seg, estado: g.uf, regional: g.reg
            }).eq('id', existente.id);
            atualizadas++;
          }
        } else {
          // Nova filial
          const { data } = await supa.from('na_filiais').insert({
            nome: g.nome, codigo_cc: g.cod_cc, segmento: g.seg,
            estado: g.uf, regional: g.reg, status: 'ativa'
          }).select().single();
          if(data){
            await NexusAuth.log('na_filiais','INSERT',data.id,null,data);
            inseridas++;
          }
        }
        if(i % 20 === 0) status.textContent = `Processando ${i}/${garagens.length}...`;
      }

      bar.style.width = '100%';
      status.textContent = `✓ Concluído: ${inseridas} inseridas, ${atualizadas} atualizadas, ${encerradas} encerradas.`;
      msg.style.color = 'var(--accent2)';
      msg.textContent = `✓ ${inseridas} novas filiais importadas`;

      setTimeout(()=>{ this._abaFiliais(el); }, 2000);

    } catch(err){
      status.textContent = 'Erro: '+err.message;
      msg.style.color = 'var(--danger)';
      msg.textContent = 'Erro na importação';
    }
  },

  // ── ABA BUDGETS ─────────────────────────────────────────────────
  async _abaBudgets(el){
    const { data: filiais } = await supa.from('na_filiais').select('id,nome,codigo_garagem,codigo_cc').eq('status','ativa').order('nome');
    const anoAtual = new Date().getFullYear();
    const anos = [anoAtual-1, anoAtual, anoAtual+1];
    const MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

    el.innerHTML = `
      <div class="panel" style="margin-bottom:14px;">
        <h2>Importar budget do arquivo</h2>
        <p style="font-size:13px;color:var(--muted);margin:0 0 12px;">
          Importe o arquivo <strong>Metas_2026.xlsb</strong>. A ferramenta lê a aba <code>Dinâmica</code>,
          extrai o budget anual B 2026 de cada filial e distribui igualmente pelos 12 meses.
          Você pode ajustar individualmente depois.
        </p>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <input type="file" id="b-import-input" accept=".xlsb,.xlsx,.xls" style="display:none;">
          <button class="btn-primary" id="btn-import-budget">📂 Importar arquivo de budget</button>
          <div class="form-group" style="margin:0;">
            <select id="b-import-ano" style="background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:7px;">
              ${anos.map(a=>`<option value="${a}" ${a===anoAtual?'selected':''}>${a}</option>`).join('')}
            </select>
          </div>
          <span id="budget-import-msg" style="font-size:12px;color:var(--accent2);"></span>
        </div>
        <div id="budget-import-progress" style="display:none;margin-top:12px;">
          <div style="height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;">
            <div id="budget-import-bar" style="height:100%;width:0%;background:var(--accent2);transition:.2s;"></div>
          </div>
          <div id="budget-import-status" style="font-size:12px;color:var(--muted);margin-top:6px;"></div>
        </div>
      </div>

      <div class="panel" style="margin-bottom:14px;">
        <h2>Editar budget por filial</h2>
        <div class="form-grid" style="max-width:500px;">
          <div class="form-group"><label>Filial</label>
            <select id="b-filial">
              <option value="">Selecione a filial</option>
              ${(filiais||[]).map(f=>`<option value="${f.id}">${f.nome}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Ano</label>
            <select id="b-ano">
              ${anos.map(a=>`<option value="${a}" ${a===anoAtual?'selected':''}>${a}</option>`).join('')}
            </select>
          </div>
        </div>
        <button class="btn-primary" id="btn-load-budget">Carregar</button>
      </div>
      <div id="budget-editor"></div>`;

    // Importação do arquivo de budget
    const btnImp = el.querySelector('#btn-import-budget');
    const fileInp = el.querySelector('#b-import-input');
    btnImp.onclick = ()=> fileInp.click();
    fileInp.onchange = async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const ano = parseInt(el.querySelector('#b-import-ano').value);
      await this._importarBudget(file, ano, filiais, el);
    };

    // Edição manual
    el.querySelector('#btn-load-budget').onclick = async ()=>{
      const filialId = el.querySelector('#b-filial').value;
      const ano      = parseInt(el.querySelector('#b-ano').value);
      if(!filialId) return alert('Selecione uma filial.');
      await this._renderBudgetEditor(el.querySelector('#budget-editor'), filialId, ano, MESES);
    };
  },

  async _importarBudget(file, ano, filiais, el){
    const msg    = el.querySelector('#budget-import-msg');
    const prog   = el.querySelector('#budget-import-progress');
    const bar    = el.querySelector('#budget-import-bar');
    const status = el.querySelector('#budget-import-status');
    prog.style.display = 'block';

    try {
      const buf  = await file.arrayBuffer();
      const wb   = XLSX.read(buf, { type:'array' });
      const sheetName = wb.SheetNames.find(s=>s.toLowerCase().includes('dinâmica') || s.toLowerCase().includes('dinamica') || s.toLowerCase().includes('din')) || wb.SheetNames[0];
      const ws   = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });

      status.textContent = `Lendo aba "${sheetName}"...`;

      // Encontra coluna "B ANO" (ex: B 2026)
      let headerRow = null, colBudget = null;
      for(const row of rows){
        for(let j=0; j<row.length; j++){
          if(String(row[j]).trim() === `B ${ano}`){
            headerRow = row;
            colBudget = j;
            break;
          }
        }
        if(colBudget !== null) break;
      }

      if(colBudget === null){
        status.textContent = `Coluna "B ${ano}" não encontrada na aba "${sheetName}".`;
        return;
      }

      // Extrai budget por garagem (linhas com Atr_cx_)
      const budgetMap = {};
      for(const row of rows){
        const cel = String(row[1]||'').trim();
        if(cel.startsWith('Atr_cx_')){
          const nome = cel.replace('Atr_cx_','').trim();
          const val  = parseFloat(row[colBudget]) || 0;
          if(val > 0) budgetMap[nome.toLowerCase()] = val;
        }
      }

      status.textContent = `${Object.keys(budgetMap).length} garagens com budget encontradas. Salvando...`;
      bar.style.width = '30%';

      // Faz o match com as filiais cadastradas pelo nome
      let salvas=0, naoEncontradas=[];
      let i=0;
      for(const filial of (filiais||[])){
        i++;
        bar.style.width = Math.round(30 + (i/(filiais||[]).length)*65)+'%';
        const nomeKey = filial.nome.toLowerCase();
        const valAnual = budgetMap[nomeKey];
        if(!valAnual){ naoEncontradas.push(filial.nome); continue; }

        // Distribui em 12 parcelas iguais
        const mensal = parseFloat((valAnual/12).toFixed(2));
        const upserts = Array.from({length:12},(_,m)=>({
          filial_id: filial.id, ano, mes: m+1, meta_receita: mensal
        }));
        await supa.from('na_budgets').upsert(upserts, {onConflict:'filial_id,ano,mes'});
        await NexusAuth.log('na_budgets','UPDATE',null,null,{filial_id:filial.id, ano, total:valAnual});
        salvas++;
      }

      bar.style.width = '100%';
      const avisoNao = naoEncontradas.length > 0 ? ` | ${naoEncontradas.length} sem correspondência` : '';
      status.textContent = `✓ ${salvas} filiais com budget salvo${avisoNao}`;
      msg.textContent = `✓ Budget ${ano} importado para ${salvas} filiais`;

    } catch(err){
      status.textContent = 'Erro: '+err.message;
      msg.style.color = 'var(--danger)';
      msg.textContent = 'Erro na importação';
    }
  },

  async _renderBudgetEditor(el, filialId, ano, MESES){
    const { data: budgets } = await supa.from('na_budgets')
      .select('*').eq('filial_id',filialId).eq('ano',ano);
    const valMap = {};
    (budgets||[]).forEach(b=>{ valMap[b.mes] = b.meta_receita; });
    const total = Object.values(valMap).reduce((s,v)=>s+v,0);

    el.innerHTML = `
      <div class="panel">
        <h2>Budget ${ano} — meta mensal</h2>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">Total anual: <strong style="color:var(--accent2);">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong></div>
        <div class="budget-grid">
          ${MESES.map((m,i)=>{
            const mes = i+1;
            const val = valMap[mes] || '';
            return `<div class="budget-cell">
              <div class="mes">${m}</div>
              <input type="number" data-mes="${mes}" value="${val}" placeholder="0,00" step="0.01">
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <button class="btn-primary" id="btn-save-budget">Salvar</button>
          <button class="btn-primary" id="btn-distribuir" style="background:var(--panel2);color:var(--text);border:1px solid var(--border);">Distribuir igualmente</button>
          <span id="budget-msg" style="font-size:12px;color:var(--accent2);"></span>
        </div>
      </div>`;

    // Distribuir igualmente o total pelos 12 meses
    el.querySelector('#btn-distribuir').onclick = ()=>{
      const t = parseFloat(prompt('Total anual a distribuir (ex: 960000):',''));
      if(isNaN(t)||t<=0) return;
      const mensal = parseFloat((t/12).toFixed(2));
      el.querySelectorAll('input[data-mes]').forEach(inp=>{ inp.value = mensal; });
    };

    el.querySelector('#btn-save-budget').onclick = async ()=>{
      const inputs = el.querySelectorAll('input[data-mes]');
      const upserts = [];
      inputs.forEach(inp=>{
        const val = parseFloat(inp.value);
        if(!isNaN(val) && val >= 0)
          upserts.push({ filial_id:filialId, ano, mes:parseInt(inp.dataset.mes), meta_receita:val });
      });
      const { error } = await supa.from('na_budgets').upsert(upserts, {onConflict:'filial_id,ano,mes'});
      if(error){ el.querySelector('#budget-msg').textContent = 'Erro: '+error.message; return; }
      await NexusAuth.log('na_budgets','UPDATE',null,null,{filial_id:filialId, ano, meses:upserts.length});
      el.querySelector('#budget-msg').textContent = '✓ Salvo!';
      setTimeout(()=>{ el.querySelector('#budget-msg').textContent=''; }, 2000);
    };
  },

  // ── ABA LOG ─────────────────────────────────────────────────────
  async _abaLog(el){
    const { data: logs } = await supa.from('na_log_alteracoes')
      .select('*').order('criado_em',{ascending:false}).limit(100);

    el.innerHTML = `
      <div class="panel">
        <h2>Últimas 100 alterações</h2>
        <table class="data-table">
          <thead><tr><th>Data/Hora</th><th>Usuário</th><th>Tabela</th><th>Operação</th></tr></thead>
          <tbody>
            ${(logs||[]).map(l=>`
              <tr>
                <td style="white-space:nowrap;">${new Date(l.criado_em).toLocaleString('pt-BR')}</td>
                <td>${l.usuario_email||'—'}</td>
                <td style="font-family:monospace;font-size:11px;">${l.tabela}</td>
                <td><span style="color:${l.operacao==='DELETE'?'var(--danger)':l.operacao==='INSERT'?'var(--accent2)':'var(--warn)'};">${l.operacao}</span></td>
              </tr>`).join('') || '<tr><td colspan="4" style="color:var(--muted)">Nenhuma alteração registrada</td></tr>'}
          </tbody>
        </table>
      </div>`;
  }
};

// Inicia após todos os scripts carregarem
window.addEventListener('load', async () => {
  Nexus.registerModule(ModuloConfiguracoes);
  document.getElementById('shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  await NexusAuth.init();
});

</script>
